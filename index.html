<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>ISL RDK Cabins — QC-3 Module Checklist</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:Arial,sans-serif;font-size:14px;color:#333;background:#f5f5f5;min-height:100vh}
.top-bar{background:#1a1a2e;color:#fff;padding:12px 20px;display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:8px;position:sticky;top:0;z-index:100}
.top-bar-left{display:flex;align-items:center;gap:14px;flex-wrap:wrap}
.top-bar-title{font-size:15px;font-weight:700}
.top-bar-sub{font-size:11px;opacity:0.6}
.top-bar-right{display:flex;gap:8px;align-items:center;flex-wrap:wrap}
.module-select{padding:7px 12px;border-radius:8px;border:1px solid rgba(255,255,255,0.3);background:rgba(255,255,255,0.1);color:#fff;font-size:13px;cursor:pointer;font-family:Arial}
.module-select option{background:#1a1a2e;color:#fff}
.drive-btn{font-size:12px;padding:6px 14px;border-radius:20px;border:1px solid rgba(255,255,255,0.3);cursor:pointer;background:transparent;color:#fff;font-family:Arial}
.drive-btn.connected{background:#1D9E75;border-color:#1D9E75}
.btn-save{padding:7px 16px;border:1px solid #378ADD;border-radius:8px;background:#378ADD;color:#fff;font-size:13px;cursor:pointer;font-family:Arial}
.btn-save:hover{background:#2570c0}
.btn-export{padding:7px 16px;border:1px solid #1D9E75;border-radius:8px;background:#1D9E75;color:#fff;font-size:13px;cursor:pointer;font-family:Arial;font-weight:700}
.btn-export:hover{background:#178a64}
.save-status{font-size:11px;color:#aaa}
.container{max-width:960px;margin:0 auto;padding:16px}
.drive-info{background:#e8f4ff;border:1px solid #b3d4f5;border-radius:8px;padding:10px 14px;font-size:12px;color:#1a5a8a;margin-bottom:14px}
.module-tabs{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:14px}
.module-tab{padding:5px 14px;border:1px solid #ddd;border-radius:20px;background:#fff;color:#666;font-size:12px;cursor:pointer;transition:all 0.15s}
.module-tab:hover{background:#f0f0f0}
.module-tab.active{background:#1a1a2e;border-color:#1a1a2e;color:#fff;font-weight:700}
.module-tab.has-data{border-color:#1D9E75;color:#1D9E75}
.module-tab.has-data.active{background:#1a1a2e;color:#fff;border-color:#1a1a2e}
.card{background:#fff;border-radius:10px;border:1px solid #e0e0e0;padding:16px 20px;margin-bottom:14px}
.meta-row{display:flex;gap:10px;flex-wrap:wrap;margin-bottom:14px}
.meta-row input{flex:1;min-width:150px;padding:8px 12px;border:1px solid #ddd;border-radius:8px;font-size:13px;font-family:Arial}
.meta-row input:focus{outline:none;border-color:#1a1a2e}
.stats{display:grid;grid-template-columns:repeat(auto-fit,minmax(90px,1fr));gap:8px;margin-bottom:14px}
.stat{background:#f8f8f8;border-radius:8px;padding:10px;text-align:center;border:1px solid #eee}
.stat .val{font-size:22px;font-weight:700}
.stat .lbl{font-size:11px;color:#888;margin-top:2px}
.stat.ok .val{color:#1D9E75}
.stat.rej .val{color:#E24B4A}
.stat.pend .val{color:#EF9F27}
.progress-bar{background:#eee;border-radius:4px;height:7px;overflow:hidden;margin-bottom:4px}
.progress-fill{height:100%;background:#1D9E75;border-radius:4px;transition:width 0.4s}
.prog-text{font-size:12px;color:#888;margin-bottom:14px}
.filters{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:14px}
.filter-btn{padding:5px 14px;border:1px solid #ddd;border-radius:20px;background:#fff;color:#666;font-size:12px;cursor:pointer}
.filter-btn.active{background:#1a1a2e;border-color:#1a1a2e;color:#fff}
.section-label{font-size:11px;font-weight:700;color:#888;text-transform:uppercase;letter-spacing:0.6px;padding:10px 0 5px;margin-top:4px}
.item{background:#fff;border:1px solid #e0e0e0;border-radius:10px;padding:13px 15px;margin-bottom:8px}
.item.accepted{border-left:4px solid #1D9E75}
.item.rejected{border-left:4px solid #E24B4A}
.item-top{display:flex;align-items:flex-start;gap:10px}
.item-num{font-size:11px;font-weight:700;color:#aaa;min-width:24px;padding-top:2px}
.item-sec-badge{font-size:10px;padding:2px 8px;border-radius:10px;background:#f0f0f0;color:#666;white-space:nowrap;flex-shrink:0;margin-top:1px}
.item-desc{flex:1;font-size:13px;line-height:1.5}
.item-actions{display:flex;gap:6px;align-items:center;margin-top:10px;flex-wrap:wrap}
.btn-accept{padding:5px 13px;border:1px solid #ccc;border-radius:7px;font-size:12px;cursor:pointer;background:#fff;color:#555;font-family:Arial}
.btn-accept:hover{background:#f0faf5}
.btn-accept.active{background:#e6f7f0;border-color:#1D9E75;color:#1D9E75;font-weight:700}
.btn-reject{padding:5px 13px;border:1px solid #ccc;border-radius:7px;font-size:12px;cursor:pointer;background:#fff;color:#555;font-family:Arial}
.btn-reject:hover{background:#fff5f5}
.btn-reject.active{background:#fef0f0;border-color:#E24B4A;color:#E24B4A;font-weight:700}
.btn-photo{padding:5px 11px;border:1px dashed #aaa;border-radius:7px;font-size:12px;cursor:pointer;background:transparent;color:#666;font-family:Arial}
.btn-photo:hover{background:#f5f5f5}
.notes-inp{flex:1;min-width:130px;padding:5px 10px;border:1px solid #ddd;border-radius:7px;font-size:12px;font-family:Arial}
.notes-inp:focus{outline:none;border-color:#1a1a2e}
.btn-del{padding:4px 9px;border:1px solid #fcc;border-radius:7px;font-size:11px;cursor:pointer;background:#fff8f8;color:#E24B4A;font-family:Arial}
.btn-na{padding:5px 13px;border:1px solid #ccc;border-radius:7px;font-size:12px;cursor:pointer;background:#fff;color:#888;font-family:Arial}
.btn-na:hover{background:#f5f5f5}
.btn-na.active{background:#f0f0f0;border-color:#888;color:#555;font-weight:700}
.item.na{border-left:4px solid #aaa;opacity:0.7}
.photos-row{display:flex;flex-wrap:wrap;gap:6px;margin-top:8px}
.thumb{position:relative;width:68px;height:68px;border-radius:7px;overflow:hidden;border:1px solid #ddd;flex-shrink:0}
.thumb img{width:100%;height:100%;object-fit:cover;cursor:pointer;display:block}
.thumb .del-p{position:absolute;top:2px;right:2px;background:rgba(0,0,0,0.65);border:none;color:#fff;border-radius:3px;padding:1px 5px;font-size:10px;cursor:pointer;line-height:1.5}
.add-form{background:#f9f9f9;border:1px solid #e0e0e0;border-radius:10px;padding:15px;margin-top:10px}
.add-form h3{font-size:13px;font-weight:700;margin-bottom:10px;color:#444}
.add-form .row{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:8px}
.add-form input,.add-form textarea{padding:7px 10px;border:1px solid #ddd;border-radius:7px;background:#fff;font-size:13px;font-family:Arial}
.add-form input:focus,.add-form textarea:focus{outline:none;border-color:#1a1a2e}
.btn-add{padding:8px 18px;border:1px solid #1a1a2e;border-radius:7px;background:#1a1a2e;color:#fff;font-size:13px;cursor:pointer;font-family:Arial}
.lightbox{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.88);z-index:9999;align-items:center;justify-content:center}
.cam-modal{display:none;position:fixed;top:0;left:0;right:0;bottom:0;background:#000;z-index:9990;flex-direction:column;align-items:center;justify-content:space-between;height:100%;height:100dvh;}
.cam-modal.open{display:flex}
.cam-video{width:100%;flex:1;min-height:0;object-fit:cover;background:#111}
.cam-bottom{width:100%;padding:16px 20px;padding-bottom:calc(16px + env(safe-area-inset-bottom, 0px));background:#111;display:flex;align-items:center;justify-content:space-between;gap:12px;flex-shrink:0}
.cam-shoot{width:72px;height:72px;border-radius:50%;border:4px solid #fff;background:#fff;cursor:pointer;flex-shrink:0;font-size:28px;display:flex;align-items:center;justify-content:center}
.cam-shoot:active{background:#ddd}
.cam-count{color:#fff;font-size:13px;text-align:center;min-width:60px}
.cam-done{padding:12px 20px;border:2px solid #1D9E75;border-radius:10px;background:#1D9E75;color:#fff;font-size:14px;font-weight:700;cursor:pointer;font-family:Arial}
.cam-close{padding:12px 20px;border:2px solid #aaa;border-radius:10px;background:transparent;color:#fff;font-size:14px;cursor:pointer;font-family:Arial}
.cam-top{width:100%;padding:12px 16px;padding-top:calc(12px + env(safe-area-inset-top, 0px));background:#111;display:flex;align-items:center;justify-content:space-between;flex-shrink:0}
.cam-title{color:#fff;font-size:14px;font-weight:700}
.cam-previews{display:flex;gap:6px;overflow-x:auto;padding:8px 16px;background:#222;width:100%;height:80px;min-height:80px;max-height:80px;align-items:center;flex-shrink:0}
.cam-thumb{width:60px;height:60px;border-radius:6px;object-fit:cover;flex-shrink:0;border:2px solid #555}
.lightbox.open{display:flex}
.lightbox img{max-width:92%;max-height:92%;border-radius:8px}
.lightbox-close{position:absolute;top:16px;right:20px;color:#fff;font-size:32px;cursor:pointer;background:none;border:none;line-height:1}
.overview-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(130px,1fr));gap:10px;margin-bottom:16px}
.overview-card{background:#fff;border:1px solid #e0e0e0;border-radius:10px;padding:12px;text-align:center;cursor:pointer;transition:all 0.15s}
.overview-card:hover{border-color:#1a1a2e}
.overview-card.active-mod{border-color:#1a1a2e;border-width:2px}
.overview-card .mod-name{font-size:14px;font-weight:700;margin-bottom:6px}
.overview-card .mod-ok{color:#1D9E75;font-size:12px}
.overview-card .mod-rej{color:#E24B4A;font-size:12px}
.overview-card .mod-pend{color:#EF9F27;font-size:12px}
.overview-card .mod-bar{background:#eee;border-radius:3px;height:4px;margin-top:6px;overflow:hidden}
.overview-card .mod-bar-fill{height:100%;background:#1D9E75;border-radius:3px}
@media(max-width:600px){.item-actions{gap:4px}.meta-row input{min-width:100%}}
</style>
</head>
<body>

<div class="top-bar">
  <div class="top-bar-left">
    <div>
      <div class="top-bar-title" id="project-title">ISL RDK Cabins — QC-3</div>
      <div class="top-bar-sub">Module Checklist</div>
    </div>
    <select class="module-select" id="project-select" onchange="switchProject(this.value)" style="background:rgba(255,255,255,0.15);font-weight:700">
      <option value="ISL_RDK">ISL RDK Cabins</option>
      <option value="GER_CS">GER CS Chimney Street</option>
    </select>
    <select class="module-select" id="module-select" onchange="switchModule(this.value)">
      <option value="">— Select module —</option>
    </select>
  </div>
  <div class="top-bar-right">
    <span class="save-status" id="save-status"></span>
    <button class="drive-btn" id="drive-btn" onclick="handleDriveAuth()">&#9679; Connect Google Drive</button>
    <button class="btn-save" onclick="saveToDrive()">&#8679; Save</button>
    <button class="btn-export" onclick="exportProtocol()">&#8681; Export Protocol</button>
  </div>
</div>

<div class="container">

  <div class="drive-info" id="drive-info" style="display:none">
    &#10003; Connected to Google Drive. All data saved to folder <strong>ISL_RDK_QC</strong>. &nbsp;<span id="drive-folder-link"></span>
  </div>

  <div class="overview-grid" id="overview-grid"></div>

  <div id="module-content" style="display:none">
    <div class="card">
      <div class="meta-row">
        <input type="text" id="inspector-input" placeholder="Quality controller name"/>
        <input type="text" id="pm-input" placeholder="Project manager name"/>
        <input type="date" id="date-input"/>
      </div>
      <div class="progress-bar"><div class="progress-fill" id="prog-fill" style="width:0%"></div></div>
      <div class="prog-text" id="prog-text">0 of 44 checked (0%)</div>
      <div class="stats">
        <div class="stat ok"><div class="val" id="s-ok">0</div><div class="lbl">Accepted</div></div>
        <div class="stat rej"><div class="val" id="s-rej">0</div><div class="lbl">Rejected</div></div>
        <div class="stat pend"><div class="val" id="s-pend">44</div><div class="lbl">Pending</div></div>
        <div class="stat"><div class="val" id="s-na">0</div><div class="lbl">N/A</div></div>
    <div class="stat"><div class="val" id="s-photos">0</div><div class="lbl">Photos</div></div>
      </div>
    </div>

    <div class="filters">
      <button class="filter-btn active" onclick="setFilter('all',this)">All</button>
      <button class="filter-btn" onclick="setFilter('pending',this)">Pending</button>
      <button class="filter-btn" onclick="setFilter('accepted',this)">Accepted</button>
      <button class="filter-btn" onclick="setFilter('rejected',this)">Rejected</button>
      <button class="filter-btn" onclick="setFilter('photos',this)">With photos</button>
  <button class="filter-btn" onclick="setFilter('na',this)">N/A</button>
    </div>

    <div id="checklist"></div>

    <div class="add-form">
      <h3>+ Add new inspection item</h3>
      <div class="row">
        <input type="text" id="new-section" placeholder="Section (e.g. Electricians)" style="flex:1;min-width:140px"/>
        <textarea id="new-desc" placeholder="Work description..." rows="2" style="flex:2;min-width:200px;resize:vertical"></textarea>
      </div>
      <button class="btn-add" onclick="addItem()">+ Add item</button>
    </div>
  </div>

</div>

<div id="photo-modal" style="display:none;position:fixed;inset:0;background:rgba(0,0,0,0.6);z-index:9998;align-items:flex-end;justify-content:center">
  <div style="background:#fff;border-radius:16px 16px 0 0;padding:24px 20px 32px;width:100%;max-width:480px;text-align:center">
    <p style="font-size:15px;font-weight:700;margin-bottom:20px;color:#333">Add photo</p>
    <button onclick="photoModalChoose('camera',false)" style="width:100%;padding:16px;border:1.5px solid #1D9E75;border-radius:12px;background:#1D9E75;color:#fff;font-size:15px;font-weight:700;cursor:pointer;font-family:Arial;margin-bottom:10px">
      📷 Take photo (camera)
    </button>
    <button onclick="photoModalChoose('gallery',false)" style="width:100%;padding:14px;border:1.5px solid #1a1a2e;border-radius:12px;background:#1a1a2e;color:#fff;font-size:14px;font-weight:700;cursor:pointer;font-family:Arial;margin-bottom:10px">
      🖼 Choose from gallery
    </button>
    <button onclick="stopShooting()" style="width:100%;padding:12px;border:1px solid #ddd;border-radius:10px;background:#f5f5f5;color:#666;font-size:14px;cursor:pointer;font-family:Arial">Cancel</button>
  </div>
</div>
<div class="cam-modal" id="cam-modal">
  <div class="cam-top">
    <span class="cam-title" id="cam-title">📷 Camera — Item #<span id="cam-item-label"></span></span>
    <button class="cam-close" onclick="closeCamera()">✕ Cancel</button>
  </div>
  <video class="cam-video" id="cam-video" autoplay playsinline muted></video>
  <canvas id="cam-canvas" style="display:none"></canvas>
  <div class="cam-previews" id="cam-previews"><span style="color:#777;font-size:12px">No photos yet</span></div>
  <div class="cam-bottom">
    <div class="cam-count" id="cam-count">0 photos</div>
    <button class="cam-shoot" id="cam-shoot-btn" onclick="shootPhoto()">📷</button>
    <button class="cam-done" onclick="doneShooting()">Done ✓</button>
  </div>
</div>
<div class="lightbox" id="lightbox" onclick="closeLightbox(event)">
  <button class="lightbox-close" onclick="document.getElementById('lightbox').classList.remove('open')">&times;</button>
  <img id="lightbox-img" src="" alt="Full size photo"/>
</div>
<input type="file" id="file-input" accept="image/*" multiple style="display:none" onchange="handlePhotos(event)"/>
<input type="file" id="camera-input" accept="image/*" capture="environment" style="display:none" onchange="handlePhotos(event)"/>

<script src="https://apis.google.com/js/api.js"></script>

function escH(s){return String(s).replace(/&/g,'&amp;').replace(/"/g,'&quot;').replace(/</g,'&lt;');}
function dateToISO(d){
  if(!d) return '';
  const parts=d.split('/');
  if(parts.length===3) return `${parts[2]}-${parts[1].padStart(2,'0')}-${parts[0].padStart(2,'0')}`;
  return '';
}
function setItemDateFromInput(id,field,isoVal){
  if(!isoVal) return;
  const parts=isoVal.split('-');
  const formatted=`${parts[2]}/${parts[1]}/${parts[0]}`;
  setItemDate(id,field,formatted);
}

function setItemStatus(id,s){
  const mod=getModState();if(!mod)return;
  const item=mod.items.find(i=>i.id===id);if(!item)return;
  const today=new Date().toLocaleDateString('en-GB');
  if(item.status===s){item.status='pending';item.acceptedDate='';item.rejectedDate='';}
  else{
    item.status=s;
    if(s==='accepted'){item.rejectedDate='';if(!item.acceptedDate)item.acceptedDate=today;}
    else if(s==='rejected'){item.acceptedDate='';if(!item.rejectedDate)item.rejectedDate=today;}
    else{item.acceptedDate='';item.rejectedDate='';}
  }
  render();renderOverview();autoSave();
}
function setItemDate(id,field,val){
  const mod=getModState();if(!mod)return;
  const item=mod.items.find(i=>i.id===id);if(!item)return;
  item[field]=val;autoSave();
}
function setNotes(id,v){const mod=getModState();if(!mod)return;const i=mod.items.find(i=>i.id===id);if(i){i.notes=v;autoSave();}}
function delItem(id){if(!confirm('Delete this item?'))return;const mod=getModState();if(!mod)return;mod.items=mod.items.filter(i=>i.id!==id);render();autoSave();}
function delPhoto(id,idx){const mod=getModState();if(!mod)return;const i=mod.items.find(i=>i.id===id);if(i){if(i.photoPreviews)i.photoPreviews.splice(idx,1);i.photoIds.splice(idx,1);render();autoSave();}}

async function openInAppCamera(itemId){

    document.getElementById('cam-video').srcObject=camStream;

function shootPhoto(){
  const video=document.getElementById('cam-video');
  const canvas=document.getElementById('cam-canvas');
  // Cap resolution to limit memory per photo (long shoots no longer crash on low-RAM devices)
  const maxW=1600;
  const srcW=video.videoWidth||1280,srcH=video.videoHeight||720;
  const scale=srcW>maxW?maxW/srcW:1;
  canvas.width=Math.round(srcW*scale);
  canvas.height=Math.round(srcH*scale);
  const ctx=canvas.getContext('2d');
  ctx.drawImage(video,0,0,canvas.width,canvas.height);
  const dataUrl=canvas.toDataURL('image/jpeg',0.8);
  camPhotos.push(dataUrl);
  // update previews
  const prev=document.getElementById('cam-previews');
  if(camPhotos.length===1) prev.innerHTML='';
  const img=document.createElement('img');
  img.src=dataUrl;img.className='cam-thumb';
  prev.appendChild(img);
  document.getElementById('cam-count').textContent=camPhotos.length+' photo'+(camPhotos.length>1?'s':'');
  // flash effect
  const btn=document.getElementById('cam-shoot-btn');
  btn.style.background='#1D9E75';
  setTimeout(()=>btn.style.background='#fff',150);
  // Upload immediately in the background so this photo's memory can be freed
  // rather than holding many full-size data URLs in camPhotos at once.
  uploadCamPhotoNow(dataUrl, camPhotos.length-1);
}

let camUploadQueue=[];
async function uploadCamPhotoNow(dataUrl, idx){
  const item=getCamItem();
  if(!item){return;}
  item.photoPreviews=item.photoPreviews||[];
  const previewId='p_'+Date.now()+'_'+idx;
  item.photoIds.push(null);
  item.photoPreviews.push({previewId,dataUrl,uploading:true,driveId:null});
  camUploadQueue.push(previewId);
  const today=new Date().toLocaleDateString('en-GB');
  if(!item.acceptedDate) item.acceptedDate=today;
  if(currentModule===item.__mod) render();
  if(!driveConnected||!folderId) return;
  let driveId=null,retries=3;
  while(retries>0&&!driveId){
    try{
      const fname=`${currentModule}_item${item.id}_${Date.now()}.jpg`;
      driveId=await uploadPhotoToDrive(dataUrl,fname);

  autoSave();
}

// ---- Read EXIF date from image
function getExifDate(file){
  return new Promise(resolve=>{
    const reader=new FileReader();
    reader.onload=e=>{
      const view=new DataView(e.target.result);
      if(view.getUint16(0,false)!==0xFFD8){resolve(null);return;}
      let offset=2;
      while(offset<view.byteLength){
        if(view.getUint16(offset,false)===0xFFE1){
          const exifLength=view.getUint16(offset+2,false);
          const exifData=new DataView(e.target.result,offset+4,exifLength-2);
          if(String.fromCharCode(...[69,120,105,102])!==
            String.fromCharCode(exifData.getUint8(0),exifData.getUint8(1),exifData.getUint8(2),exifData.getUint8(3))){resolve(null);return;}
          const littleEndian=exifData.getUint16(6)===0x4949;
          const ifdOffset=exifData.getUint32(10,littleEndian)+6;
          const entries=exifData.getUint16(ifdOffset,littleEndian);
          for(let i=0;i<entries;i++){
            const tag=exifData.getUint16(ifdOffset+2+i*12,littleEndian);
            if(tag===0x9003||tag===0x0132){// DateTimeOriginal or DateTime
              const valOffset=exifData.getUint32(ifdOffset+2+i*12+8,littleEndian)+6;
              let str='';
              for(let j=0;j<19;j++) str+=String.fromCharCode(exifData.getUint8(valOffset+j));
              // format: "2026:06:12 16:50:00" -> "12/06/2026"
              const p=str.split(' ')[0].split(':');
              if(p.length===3) resolve(`${p[2]}/${p[1]}/${p[0]}`);
              else resolve(null);
              return;
            }
          }
          resolve(null);return;
        }
        offset+=2+view.getUint16(offset+2,false);
      }
      resolve(null);
    };
    reader.onerror=()=>resolve(null);
    reader.readAsArrayBuffer(file.slice(0,65536));
  });
}

function extractDateFromFilename(name){
  const m=(name||'').match(/(\d{4})(\d{2})(\d{2})/);
  if(m){
    const y=parseInt(m[1]),mo=parseInt(m[2]),d=parseInt(m[3]);
    if(y>=2000&&y<=2099&&mo>=1&&mo<=12&&d>=1&&d<=31)
      return new Date(y,mo-1,d);
  }
  return null;
}

async function handlePhotos(e){
  const files=[...e.target.files];
  const mod=getModState();if(!mod)return;
  const item=mod.items.find(i=>i.id===currentPhotoItemId);if(!item)return;
  if(!driveConnected||!folderId){setStatus('Connect Google Drive first.');e.target.value='';return;}
  item.photoPreviews=item.photoPreviews||[];
  // Detect a date from the first photo (filename > EXIF > file lastModified) and use it for acceptedDate
  if(!item.acceptedDate&&files.length>0){
    let detected=null;
    for(const f of files){
      const fnDate=extractDateFromFilename(f.name);
      if(fnDate){detected=fnDate.toLocaleDateString('en-GB');break;}
    }
    if(!detected){
      for(const f of files){
        const exifStr=await getExifDate(f);
        if(exifStr){detected=exifStr;break;}
      }
    }
    if(!detected&&files[0].lastModified){
      detected=new Date(files[0].lastModified).toLocaleDateString('en-GB');
    }
    if(detected) item.acceptedDate=detected;
  }
  // 1. Show all previews immediately — no waiting
  const newPreviews=[];
  for(const f of files){
    let dataUrl;
    try{dataUrl=await readFile(f);}catch(err){continue;}
    const previewId='p_'+Date.now()+'_'+Math.random().toString(36).slice(2);
    item.photoIds.push(null);
    item.photoPreviews.push({previewId,dataUrl,uploading:true,driveId:null});
    newPreviews.push({previewId,dataUrl,item});
  }
  render();
  setStatus(`${newPreviews.length} photo${newPreviews.length>1?'s':''} added — uploading in background...`);
  e.target.value='';
  // 2. Upload in background — user can keep working
  for(const {previewId,dataUrl,item} of newPreviews){
    const pv=item.photoPreviews.find(p=>p.previewId===previewId);
    if(!pv) continue;
    let driveId=null,retries=3;
    while(retries>0&&!driveId){
      try{
        const fname=`${currentModule}_item${item.id}_${Date.now()}.jpg`;
        driveId=await uploadPhotoToDrive(dataUrl,fname);
      }catch(err){retries--;if(retries>0)await new Promise(r=>setTimeout(r,1500));}
    }
    if(driveId){
      pv.uploading=false;pv.driveId=driveId;pv.dataUrl='';
      const ixId=item.photoIds.findIndex((_,i)=>item.photoPreviews[i]&&item.photoPreviews[i].previewId===previewId);
      if(ixId>=0) item.photoIds[ixId]=driveId;
      render();
    } else {
      item.photoPreviews=item.photoPreviews.filter(p=>p.previewId!==previewId);
      render();
    }
  }
  const uploaded=item.photoPreviews.filter(p=>!p.uploading).length;
  setStatus(`Upload complete — ${uploaded} photo${uploaded>1?'s':''} saved ✓`);
  autoSave();
}

let tokenClient,gapiInited=false,gisInited=false;
let moduleFolderIds={};

async function ensureModuleFolder(modName){
  if(moduleFolderIds[modName]) return moduleFolderIds[modName];
  if(!folderId) return null;
  try{
    let res=await driveRequest({path:'https://www.googleapis.com/drive/v3/files',params:{q:`name='${modName}' and '${folderId}' in parents and mimeType='application/vnd.google-apps.folder' and trashed=false`,fields:'files(id)'}});
    if(res.result.files&&res.result.files.length>0){
      moduleFolderIds[modName]=res.result.files[0].id;
    } else {
      let cr=await driveRequest({path:'https://www.googleapis.com/drive/v3/files',method:'POST',body:{name:modName,mimeType:'application/vnd.google-apps.folder',parents:[folderId]}});
      moduleFolderIds[modName]=cr.result.id;
    }
    return moduleFolderIds[modName];
  }catch(e){console.error('Subfolder error:',e);return folderId;}
}

function gapiLoaded(){
  gapi.load('client',async()=>{
    await gapi.client.init({});
    gapiInited=true;maybeEnableDrive();
  });
}
function gisLoaded(){
  tokenClient=google.accounts.oauth2.initTokenClient({client_id:CLIENT_ID,scope:SCOPES,callback:''});
  gisInited=true;
  const btn=document.getElementById('drive-btn');
  if(btn&&!driveConnected){btn.textContent='⬤ Connect Google Drive';btn.disabled=false;}
  maybeEnableDrive();
}
function maybeEnableDrive(){
  if(gapiInited&&gisInited){
    const saved=localStorage.getItem('qc_drive_token');
    if(saved){
      const tok=JSON.parse(saved);
      gapi.client.setToken(tok);
      driveConnected=true;updateDriveUI(true);
      if(tokenNeedsRefresh()){
        silentRefreshToken().then(()=>ensureFolderAndLoad());
      } else {
        ensureFolderAndLoad();
      }
    }
  }
}

function silentRefreshToken(){
  if(!tokenClient||!driveConnected) return Promise.resolve(false);
  return new Promise(resolve=>{
    tokenClient.callback=async(resp)=>{
      if(resp.error){
        // silent refresh failed, show reconnect button
        driveConnected=false;
        updateDriveUI(false);
        setStatus('Drive disconnected — please reconnect');
        resolve(false);
        return;
      }
      const tok=gapi.client.getToken();
      tok.acquired_at=Date.now();
      localStorage.setItem('qc_drive_token',JSON.stringify(tok));
      driveConnected=true;
      setStatus('Drive token refreshed ✓');
      resolve(true);
    };
    tokenClient.requestAccessToken({prompt:''});// prompt:'' = silent, no popup
  });
}

function tokenNeedsRefresh(){
  const tok=gapi.client.getToken();
  if(!tok) return true;
  const acquiredAt=tok.acquired_at||0;
  const expiresInMs=(tok.expires_in||3600)*1000;
  const elapsed=Date.now()-acquiredAt;
  return elapsed > (expiresInMs - 5*60*1000); // refresh 5 min before real expiry
}

// Wrap any Drive API call: auto-refresh token first if needed, retry once on 401
async function driveRequest(opts){
  if(!driveConnected){throw new Error('Drive not connected');}
  if(tokenNeedsRefresh()){
    await silentRefreshToken();
  }
  try{
    return await gapi.client.request(opts);
  }catch(e){
    const status=e&&(e.status||(e.result&&e.result.error&&e.result.error.code)||(e.code));
    if(status===401||status===403){
      const ok=await silentRefreshToken();
      if(ok) return await gapi.client.request(opts);
    }
    throw e;
  }
}

async function loadModuleFromDrive(modName){
  try{
    const fname=`qc_${modName.replace('-','')}.json`;
    let res=await driveRequest({path:'https://www.googleapis.com/drive/v3/files',params:{q:`name='${fname}' and trashed=false`,fields:'files(id,name)'}});
    let files=res.result.files;
    if(files&&files.length>0){
      driveFileIds[modName]=files[0].id;
      let dl=await driveRequest({path:`https://www.googleapis.com/drive/v3/files/${files[0].id}`,params:{alt:'media'}});
      const saved=dl.result;
      if(saved&&saved.items){
        saved.items.forEach(si=>{
          let cur=modules[modName].items.find(i=>i.id===si.id);
          if(cur){
            cur.status=si.status||'pending';cur.notes=si.notes||'';
            cur.acceptedDate=si.acceptedDate||'';cur.rejectedDate=si.rejectedDate||'';
            const ids=(si.photoIds||[]).filter(Boolean);
            cur.photoIds=ids;
            cur.photoPreviews=ids.map(did=>({previewId:did,driveId:did,uploading:false,dataUrl:''}));
          } else {
            // new item added to template after module was created - add it
            const tmpl=(PROJECTS[currentProject]&&PROJECTS[currentProject].itemsTemplate)||ITEMS_TEMPLATE;
            const newItem=tmpl.find(t=>t.id===si.id);
            if(!newItem) modules[modName].items.push({...si,status:si.status||'pending',photos:[],photoIds:(si.photoIds||[]).filter(Boolean),photoPreviews:(si.photoIds||[]).filter(Boolean).map(did=>({previewId:did,driveId:did,uploading:false,dataUrl:''}))});
          }
        });
      }
      if(saved&&saved.meta) modules[modName].meta=saved.meta;
      // Add any new template items that don't exist in saved data yet
      const tmpl=(PROJECTS[currentProject]&&PROJECTS[currentProject].itemsTemplate)||ITEMS_TEMPLATE;
      tmpl.forEach(ti=>{
        if(!modules[modName].items.find(i=>i.id===ti.id)){
          modules[modName].items.push({...ti,status:'pending',notes:'',acceptedDate:'',rejectedDate:'',photos:[],photoIds:[],photoPreviews:[]});
        }
      });
      // Sort by id
      modules[modName].items.sort((a,b)=>a.id-b.id);
    }
  }catch(e){console.warn('Load error for '+modName,e);}
}

async function saveToDrive(){
  if(!driveConnected){alert('Please connect Google Drive first.');return;}
  if(!currentModule){alert('Please select a module first.');return;}
  // save current meta
  modules[currentModule].meta.inspector=document.getElementById('inspector-input').value;
  modules[currentModule].meta.pm=document.getElementById('pm-input').value;
  modules[currentModule].meta.date=document.getElementById('date-input').value;
  setStatus('Saving...');
  try{
    const modName=currentModule;
    const fname=`qc_${modName.replace('-','')}.json`;
    const payload={meta:modules[modName].meta,items:modules[modName].items.map(i=>({id:i.id,section:i.section,desc:i.desc,status:i.status,notes:i.notes,acceptedDate:i.acceptedDate,rejectedDate:i.rejectedDate,photoIds:(i.photoIds||[]).filter(Boolean)}))};
    const body=JSON.stringify(payload);
    if(driveFileIds[modName]){
      await driveRequest({path:`https://www.googleapis.com/upload/drive/v3/files/${driveFileIds[modName]}`,method:'PATCH',params:{uploadType:'media'},headers:{'Content-Type':'application/json'},body});
    } else {
      const modSubFolder=(await ensureModuleFolder(modName))||folderId;
      const meta={name:fname,parents:[modSubFolder]};
      const boundary='bound_xyz';
      const mp=`--${boundary}\r\nContent-Type: application/json\r\n\r\n${JSON.stringify(meta)}\r\n--${boundary}\r\nContent-Type: application/json\r\n\r\n${body}\r\n--${boundary}--`;
      let cr=await driveRequest({path:'https://www.googleapis.com/upload/drive/v3/files',method:'POST',params:{uploadType:'multipart'},headers:{'Content-Type':`multipart/related; boundary=${boundary}`},body:mp});
      driveFileIds[modName]=cr.result.id;
    }
    setStatus('Saved ✓ '+new Date().toLocaleTimeString());
    renderOverview();
  }catch(e){setStatus('Save error: '+e.message);}
}

async function uploadPhotoToDrive(dataUrl,filename){
  if(!driveConnected||!folderId)return null;
  try{
    const base64=dataUrl.split(',')[1];
    const mime=dataUrl.split(';')[0].split(':')[1];
    const targetFolder=(await ensureModuleFolder(currentModule))||folderId;
    const meta={name:filename,parents:[targetFolder]};
    const boundary='photo_bound';
    const body=`--${boundary}\r\nContent-Type: application/json\r\n\r\n${JSON.stringify(meta)}\r\n--${boundary}\r\nContent-Type: ${mime}\r\nContent-Transfer-Encoding: base64\r\n\r\n${base64}\r\n--${boundary}--`;
    let res=await driveRequest({path:'https://www.googleapis.com/upload/drive/v3/files',method:'POST',params:{uploadType:'multipart'},headers:{'Content-Type':`multipart/related; boundary=${boundary}`},body});
    return res.result.id;
  }catch(e){console.error('Photo upload error:',e);return null;}
}
