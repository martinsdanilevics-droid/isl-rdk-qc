<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>ISL RDK Cabins — QC-3 Module Checklist</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:Arial,sans-serif;font-size:14px;color:#333;background:#f5f5f5;min-height:100vh}
.top-bar{background:#1a1a2e;color:#fff;padding:12px 20px;display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:8px;position:sticky;top:0;z-index:100}
.top-bar h1{font-size:15px;font-weight:700}
.top-bar .sub{font-size:11px;opacity:0.7}
.drive-status{font-size:12px;padding:4px 12px;border-radius:20px;border:1px solid rgba(255,255,255,0.3);cursor:pointer}
.drive-status.connected{background:#1D9E75;border-color:#1D9E75}
.drive-status.disconnected{background:transparent}
.container{max-width:960px;margin:0 auto;padding:16px}
.card{background:#fff;border-radius:10px;border:1px solid #e0e0e0;padding:16px 20px;margin-bottom:14px}
.meta-row{display:flex;gap:10px;flex-wrap:wrap;margin-bottom:14px}
.meta-row input{flex:1;min-width:150px;padding:8px 12px;border:1px solid #ddd;border-radius:8px;font-size:13px;font-family:Arial}
.meta-row input:focus{outline:none;border-color:#1a1a2e}
.stats{display:grid;grid-template-columns:repeat(auto-fit,minmax(90px,1fr));gap:8px;margin-bottom:14px}
.stat{background:#f8f8f8;border-radius:8px;padding:10px;text-align:center;border:1px solid #eee}
.stat .val{font-size:22px;font-weight:700}
.stat .lbl{font-size:11px;color:#888;margin-top:2px}
.stat.ok .val{color:#1D9E75}
.stat.rej .val{color:#E24B4A}
.stat.pend .val{color:#EF9F27}
.progress-bar{background:#eee;border-radius:4px;height:7px;overflow:hidden;margin-bottom:4px}
.progress-fill{height:100%;background:#1D9E75;border-radius:4px;transition:width 0.4s}
.prog-text{font-size:12px;color:#888;margin-bottom:14px}
.filters{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:14px}
.filter-btn{padding:5px 14px;border:1px solid #ddd;border-radius:20px;background:#fff;color:#666;font-size:12px;cursor:pointer}
.filter-btn.active{background:#1a1a2e;border-color:#1a1a2e;color:#fff}
.section-label{font-size:11px;font-weight:700;color:#888;text-transform:uppercase;letter-spacing:0.6px;padding:10px 0 5px;margin-top:4px}
.item{background:#fff;border:1px solid #e0e0e0;border-radius:10px;padding:13px 15px;margin-bottom:8px;transition:border-left 0.2s}
.item.accepted{border-left:4px solid #1D9E75}
.item.rejected{border-left:4px solid #E24B4A}
.item-top{display:flex;align-items:flex-start;gap:10px}
.item-num{font-size:11px;font-weight:700;color:#aaa;min-width:24px;padding-top:2px}
.item-sec-badge{font-size:10px;padding:2px 8px;border-radius:10px;background:#f0f0f0;color:#666;white-space:nowrap;flex-shrink:0;margin-top:1px}
.item-desc{flex:1;font-size:13px;line-height:1.5}
.item-actions{display:flex;gap:6px;align-items:center;margin-top:10px;flex-wrap:wrap}
.btn-accept{padding:5px 13px;border:1px solid #ccc;border-radius:7px;font-size:12px;cursor:pointer;background:#fff;color:#555;font-family:Arial}
.btn-accept:hover{background:#f0faf5}
.btn-accept.active{background:#e6f7f0;border-color:#1D9E75;color:#1D9E75;font-weight:700}
.btn-reject{padding:5px 13px;border:1px solid #ccc;border-radius:7px;font-size:12px;cursor:pointer;background:#fff;color:#555;font-family:Arial}
.btn-reject:hover{background:#fff5f5}
.btn-reject.active{background:#fef0f0;border-color:#E24B4A;color:#E24B4A;font-weight:700}
.btn-photo{padding:5px 11px;border:1px dashed #aaa;border-radius:7px;font-size:12px;cursor:pointer;background:transparent;color:#666;font-family:Arial}
.btn-photo:hover{background:#f5f5f5}
.notes-inp{flex:1;min-width:130px;padding:5px 10px;border:1px solid #ddd;border-radius:7px;font-size:12px;font-family:Arial}
.notes-inp:focus{outline:none;border-color:#1a1a2e}
.btn-del{padding:4px 9px;border:1px solid #fcc;border-radius:7px;font-size:11px;cursor:pointer;background:#fff8f8;color:#E24B4A;font-family:Arial}
.photos-row{display:flex;flex-wrap:wrap;gap:6px;margin-top:8px}
.thumb{position:relative;width:68px;height:68px;border-radius:7px;overflow:hidden;border:1px solid #ddd;flex-shrink:0}
.thumb img{width:100%;height:100%;object-fit:cover;cursor:pointer;display:block}
.thumb .del-p{position:absolute;top:2px;right:2px;background:rgba(0,0,0,0.65);border:none;color:#fff;border-radius:3px;padding:1px 5px;font-size:10px;cursor:pointer;line-height:1.5}
.thumb .uploading{position:absolute;inset:0;background:rgba(255,255,255,0.8);display:flex;align-items:center;justify-content:center;font-size:10px;color:#666}
.add-form{background:#f9f9f9;border:1px solid #e0e0e0;border-radius:10px;padding:15px;margin-top:10px}
.add-form h3{font-size:13px;font-weight:700;margin-bottom:10px;color:#444}
.add-form .row{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:8px}
.add-form input,.add-form textarea{padding:7px 10px;border:1px solid #ddd;border-radius:7px;background:#fff;font-size:13px;font-family:Arial}
.add-form input:focus,.add-form textarea:focus{outline:none;border-color:#1a1a2e}
.btn-add{padding:8px 18px;border:1px solid #1a1a2e;border-radius:7px;background:#1a1a2e;color:#fff;font-size:13px;cursor:pointer;font-family:Arial}
.btn-add:hover{background:#2a2a4e}
.btn-export{padding:9px 20px;border:1px solid #1D9E75;border-radius:8px;background:#1D9E75;color:#fff;font-size:13px;cursor:pointer;font-family:Arial;font-weight:700}
.btn-export:hover{background:#178a64}
.btn-save{padding:9px 20px;border:1px solid #378ADD;border-radius:8px;background:#378ADD;color:#fff;font-size:13px;cursor:pointer;font-family:Arial}
.btn-save:hover{background:#2570c0}
.save-status{font-size:12px;color:#888;padding:4px 0}
.lightbox{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.88);z-index:9999;align-items:center;justify-content:center}
.lightbox.open{display:flex}
.lightbox img{max-width:92%;max-height:92%;border-radius:8px}
.lightbox-close{position:absolute;top:16px;right:20px;color:#fff;font-size:28px;cursor:pointer;background:none;border:none;line-height:1}
.drive-info{background:#e8f4ff;border:1px solid #b3d4f5;border-radius:8px;padding:10px 14px;font-size:12px;color:#1a5a8a;margin-bottom:14px}
.drive-info a{color:#1a5a8a;font-weight:700}
@media(max-width:600px){.item-actions{gap:4px}.meta-row input{min-width:100%}}
</style>
</head>
<body>

<div class="top-bar">
  <div>
    <div class="h1">ISL RDK Cabins — Module QC Checklist &nbsp;<span style="opacity:0.5;font-weight:400;font-size:12px">No. QC-3</span></div>

<div class="container">

    <div class="stats">

      <div class="stat rej"><div class="val" id="s-rej">0</div><div class="lbl">Rejected</div></div>

    <button class="filter-btn" onclick="setFilter('pending',this)">Pending</button>
    <button class="filter-btn" onclick="setFilter('accepted',this)">Accepted</button>
    <button class="filter-btn" onclick="setFilter('rejected',this)">Rejected</button>
    <button class="filter-btn" onclick="setFilter('photos',this)">With photos</button>
  </div>

  <div id="checklist"></div>

  <div class="add-form">
    <h3>+ Add new inspection item</h3>
    <div class="row">
      <input type="text" id="new-section" placeholder="Section (e.g. Electricians)" style="flex:1;min-width:140px"/>
      <textarea id="new-desc" placeholder="Work description..." rows="2" style="flex:2;min-width:200px;resize:vertical"></textarea>
    </div>
    <button class="btn-add" onclick="addItem()">+ Add item</button>
  </div>

</div>

<div class="lightbox" id="lightbox" onclick="closeLightbox(event)">
  <button class="lightbox-close" onclick="document.getElementById('lightbox').classList.remove('open')">&times;</button>
  <img id="lightbox-img" src="" alt="Full size photo"/>
</div>
<input type="file" id="file-input" accept="image/*" multiple style="display:none" onchange="handlePhotos(event)"/>

<script src="https://apis.google.com/js/api.js"></script>
<script>

const FOLDER_NAME = 'ISL_RDK_QC';

  {id:17,section:"Windows / doors",desc:"Windows in roof panels have been installed in accordance with the project drawings and installation guidelines. Sealing tapes and thermal insulation are applied properly and meet the required standards."},
  {id:18,section:"Windows / doors",desc:"Installation of entrance door frames complies with the design drawings and manufacturer's instructions. Insulation has been correctly installed, and the frames are properly protected."},

  {id:21,section:"Frame exterior finish",desc:"External wall thermal insulation has been properly installed with no gaps. Specified insulation properties, such as thermal conductivity (λ) and thickness, have been observed and confirmed."},

  {id:31,section:"Int. finishing, painting",desc:"Wall finishing with interior boards has been completed. Multiple board types were used. No visible defects were observed. 2nd floor."},
  {id:32,section:"Furniture, floor finish",desc:"The substrate for the flooring has been prepared. Flooring has been installed and adhered according to the manufacturer's guidelines and layout specifications. No visible defects were observed. 1st floor."},
  {id:33,section:"Furniture, floor finish",desc:"The substrate for the flooring has been prepared. Flooring has been installed and adhered according to the manufacturer's guidelines and layout specifications. No visible defects were observed. 2nd floor."},
  {id:34,section:"Furniture",desc:"Furniture assembly has been completed according to the project specifications. Cabinets are securely fixed, fittings are functional, and adjustments have been performed."},
  {id:35,section:"Finishing, furniture",desc:"Assembly of interior doors has been completed. Door hardware conforms to the design specifications."},
  {id:36,section:"Finishing, furniture",desc:"Skirting boards and door moldings have been installed in accordance with the specified installation procedures. Joints have been properly executed."},
  {id:37,section:"Bathroom finishing",desc:"Installation of bathroom furniture and equipment has been completed as per the project specifications and manufacturer's guidelines."},
  {id:38,section:"Bathroom finishing",desc:"Glass partitions for the bathroom shower have been installed in accordance with the design drawings and manufacturer's specifications. All fittings are functioning correctly."},
  {id:39,section:"Water supply, HVAC",desc:"Additional measurements of the water supply system were performed with water mixers and shower equipment connected. No leaks were detected or required repair (see Form QC-5)."},
  {id:40,section:"Electricians",desc:"Installation of sockets, lighting fixtures, and switches has been completed. All electrical equipment has been installed in accordance with specified technical requirements. The distribution box has been connected."},
  {id:41,section:"Electricians",desc:"The operation of lighting, sockets, and switches has been tested and confirmed to be in full compliance with the project specifications."},
  {id:42,section:"Electricians, foreman",desc:"Electrical measurements have been performed. No deviations from the standards were recorded (refer to Forms QC-6 and QC-7)."},
  {id:43,section:"Module packaging",desc:"The module has been cleaned. Equipment, furniture, and accompanying materials have been secured. An inventory check of installed materials has been completed."},
  {id:44,section:"Module packaging",desc:"Protective frame has been installed. The module has been packed in accordance with the instructions, and the labeling is correct."}
];

let state = {
  items: ITEMS_DEFAULT.map(i=>({...i,status:'pending',notes:'',acceptedDate:'',rejectedDate:'',photos:[],photoIds:[]})),
  filter:'all',
  currentPhotoId:null,
  driveConnected:false,
  folderId:null,
  dataFileId:null
};

// ---- GOOGLE DRIVE ----
let tokenClient, gapiInited=false, gisInited=false;

function gapiLoaded(){
  gapi.load('client', async ()=>{
    await gapi.client.init({});
    gapiInited=true;
    maybeEnableDrive();
  });
}

function gisLoaded(){
  tokenClient = google.accounts.oauth2.initTokenClient({
    client_id: CLIENT_ID,
    scope: SCOPES,
    callback:''
  });
  gisInited=true;
  maybeEnableDrive();
}

function maybeEnableDrive(){
  if(gapiInited && gisInited){
    const saved = localStorage.getItem('qc_drive_token');
    if(saved){
      gapi.client.setToken(JSON.parse(saved));
      state.driveConnected=true;
      updateDriveUI(true);
      ensureFolderAndLoad();
    }
  }
}

function handleDriveAuth(){
  tokenClient.callback = async (resp)=>{
    if(resp.error) return;
    localStorage.setItem('qc_drive_token', JSON.stringify(gapi.client.getToken()));
    state.driveConnected=true;
    updateDriveUI(true);
    setStatus2('Connected to Google Drive');
    await ensureFolderAndLoad();
  };
  tokenClient.requestAccessToken({prompt:'consent'});
}

function updateDriveUI(connected){
  const btn=document.getElementById('drive-btn');
  const info=document.getElementById('drive-info');
  if(connected){
    btn.textContent='✓ Google Drive connected';
    btn.className='drive-status connected';
    info.style.display='block';
  } else {
    btn.textContent='⬤ Connect Google Drive';
    btn.className='drive-status disconnected';
    info.style.display='none';
  }
}

async function ensureFolderAndLoad(){
  try {
    setStatus2('Checking Drive folder...');
    let res = await gapi.client.request({
      path:'https://www.googleapis.com/drive/v3/files',
      params:{q:`name='${FOLDER_NAME}' and mimeType='application/vnd.google-apps.folder' and trashed=false`,fields:'files(id,name,webViewLink)'}
    });
    let files = res.result.files;
    if(files && files.length>0){
      state.folderId=files[0].id;
      const link=files[0].webViewLink;
      document.getElementById('drive-folder-link').innerHTML=` — <a href="${link}" target="_blank">Open folder</a>`;
    } else {
      let cr = await gapi.client.request({
        path:'https://www.googleapis.com/drive/v3/files',
        method:'POST',
        body:{name:FOLDER_NAME,mimeType:'application/vnd.google-apps.folder'}
      });
      state.folderId=cr.result.id;
    }
    await loadFromDrive();
  } catch(e){
    setStatus2('Drive error: '+e.message);
  }
}

async function loadFromDrive(){
  try {
    setStatus2('Loading data from Drive...');
    let res = await gapi.client.request({
      path:'https://www.googleapis.com/drive/v3/files',
      params:{q:`name='qc_state.json' and '${state.folderId}' in parents and trashed=false`,fields:'files(id,name)'}
    });
    let files=res.result.files;
    if(files && files.length>0){
      state.dataFileId=files[0].id;
      let dl = await gapi.client.request({
        path:`https://www.googleapis.com/drive/v3/files/${state.dataFileId}`,
        params:{alt:'media'}
      });
      let saved=dl.result;
      if(saved && saved.items){
        saved.items.forEach(saved_item=>{
          let cur=state.items.find(i=>i.id===saved_item.id);
          if(cur){
            cur.status=saved_item.status||'pending';
            cur.notes=saved_item.notes||'';
            cur.acceptedDate=saved_item.acceptedDate||'';
            cur.rejectedDate=saved_item.rejectedDate||'';
            cur.photoIds=saved_item.photoIds||[];
            cur.photos=saved_item.photos||[];
          }
        });
        if(saved.meta){
          if(saved.meta.module) document.getElementById('mod-input').value=saved.meta.module;
          if(saved.meta.inspector) document.getElementById('inspector-input').value=saved.meta.inspector;
          if(saved.meta.pm) document.getElementById('pm-input').value=saved.meta.pm;
          if(saved.meta.date) document.getElementById('date-input').value=saved.meta.date;
        }
      }
      setStatus2('Loaded from Drive ✓');
    } else {
      setStatus2('New checklist — save to Drive when ready');
    }
    render();
  } catch(e){
    setStatus2('Load error: '+e.message);
    render();
  }
}

async function saveToDrive(){
  if(!state.driveConnected){alert('Please connect Google Drive first.');return;}
  setStatus2('Saving...');
  try {
    const payload={
      meta:{
        module:document.getElementById('mod-input').value,
        inspector:document.getElementById('inspector-input').value,
        pm:document.getElementById('pm-input').value,
        date:document.getElementById('date-input').value
      },
      items:state.items.map(i=>({
        id:i.id,section:i.section,desc:i.desc,
        status:i.status,notes:i.notes,
        acceptedDate:i.acceptedDate,rejectedDate:i.rejectedDate,
        photoIds:i.photoIds,
        photos:i.photos
      }))
    };
    const body=JSON.stringify(payload);
    if(state.dataFileId){
      await gapi.client.request({
        path:`https://www.googleapis.com/upload/drive/v3/files/${state.dataFileId}`,
        method:'PATCH',
        params:{uploadType:'media'},
        headers:{'Content-Type':'application/json'},
        body
      });
    } else {
      const meta={name:'qc_state.json',parents:[state.folderId]};
      const boundary='foo_bar_baz';
      const multipart=`--${boundary}\r\nContent-Type: application/json\r\n\r\n${JSON.stringify(meta)}\r\n--${boundary}\r\nContent-Type: application/json\r\n\r\n${body}\r\n--${boundary}--`;
      let cr=await gapi.client.request({
        path:'https://www.googleapis.com/upload/drive/v3/files',
        method:'POST',
        params:{uploadType:'multipart'},
        headers:{'Content-Type':`multipart/related; boundary=${boundary}`},
        body:multipart
      });
      state.dataFileId=cr.result.id;
    }
    setStatus2('Saved to Drive ✓ — '+new Date().toLocaleTimeString());
  } catch(e){
    setStatus2('Save error: '+e.message);
  }
}

async function uploadPhotoToDrive(itemId, dataUrl, filename){
  if(!state.driveConnected||!state.folderId) return null;
  try {
    const base64=dataUrl.split(',')[1];
    const mime=dataUrl.split(';')[0].split(':')[1];
    const meta={name:filename,parents:[state.folderId]};
    const boundary='photo_boundary_xyz';
    const body=`--${boundary}\r\nContent-Type: application/json\r\n\r\n${JSON.stringify(meta)}\r\n--${boundary}\r\nContent-Type: ${mime}\r\nContent-Transfer-Encoding: base64\r\n\r\n${base64}\r\n--${boundary}--`;
    let res=await gapi.client.request({
      path:'https://www.googleapis.com/upload/drive/v3/files',
      method:'POST',
      params:{uploadType:'multipart'},
      headers:{'Content-Type':`multipart/related; boundary=${boundary}`},
      body
    });
    return res.result.id;
  } catch(e){
    console.error('Photo upload error:',e);
    return null;
  }
}

// ---- UI ----
function setStatus2(msg){document.getElementById('save-status').textContent=msg;}

function render(){
  const list=document.getElementById('checklist');
  const sections={};
  const filtered=state.items.filter(i=>{
    if(state.filter==='pending') return i.status==='pending';
    if(state.filter==='accepted') return i.status==='accepted';
    if(state.filter==='rejected') return i.status==='rejected';
    if(state.filter==='photos') return i.photos.length>0;
    return true;
  });
  filtered.forEach(i=>{if(!sections[i.section])sections[i.section]=[];sections[i.section].push(i);});
  let html='';
  Object.entries(sections).forEach(([sec,items])=>{
    html+=`<div class="section-label">${sec}</div>`;
    items.forEach(i=>{
      const cls=i.status==='accepted'?'accepted':i.status==='rejected'?'rejected':'';
      html+=`<div class="item ${cls}" id="item-${i.id}">
        <div class="item-top">
          <span class="item-num">#${i.id}</span>
          <span class="item-sec-badge">${i.section}</span>
          <span class="item-desc">${i.desc}</span>
        </div>
        <div class="item-actions">
          <button class="btn-accept ${i.status==='accepted'?'active':''}" onclick="setItemStatus(${i.id},'accepted')">&#10003; Quality accepted</button>
          <button class="btn-reject ${i.status==='rejected'?'active':''}" onclick="setItemStatus(${i.id},'rejected')">&#10007; Rejected</button>
          <button class="btn-photo" onclick="openPhotoUpload(${i.id})">&#128247; Photo (${i.photos.length})</button>
          <input class="notes-inp" type="text" placeholder="Notes..." value="${escH(i.notes)}" onchange="setNotes(${i.id},this.value)"/>
          <button class="btn-del" onclick="delItem(${i.id})">&#128465;</button>
        </div>`;
      if(i.photos.length>0){
        html+=`<div class="photos-row">`;
        i.photos.forEach((p,idx)=>{
          html+=`<div class="thumb"><img src="${p}" onclick="openLightbox('${p}')" alt="Photo ${idx+1}"/><button class="del-p" onclick="delPhoto(${i.id},${idx})">&#10005;</button></div>`;
        });
        html+='</div>';
      }
      html+='</div>';
    });
  });
  list.innerHTML=html||'<p style="color:#aaa;padding:20px;text-align:center">No matching items</p>';
  updateStats();
}

function escH(s){return String(s).replace(/&/g,'&amp;').replace(/"/g,'&quot;').replace(/</g,'&lt;');}

function setItemStatus(id,s){
  const item=state.items.find(i=>i.id===id);
  if(!item)return;
  const now=new Date().toLocaleDateString('en-GB');
  if(item.status===s){item.status='pending';item.acceptedDate='';item.rejectedDate='';}
  else{item.status=s;item.acceptedDate=s==='accepted'?now:'';item.rejectedDate=s==='rejected'?now:'';}
  render();
  autoSave();
}
function setNotes(id,v){const i=state.items.find(i=>i.id===id);if(i)i.notes=v;autoSave();}
function delItem(id){if(confirm('Delete this item?')){state.items=state.items.filter(i=>i.id!==id);render();autoSave();}}
function delPhoto(id,idx){const i=state.items.find(i=>i.id===id);if(i){i.photos.splice(idx,1);i.photoIds.splice(idx,1);render();autoSave();}}

let autoSaveTimer=null;
function autoSave(){
  clearTimeout(autoSaveTimer);
  autoSaveTimer=setTimeout(()=>{if(state.driveConnected)saveToDrive();},3000);
}

function openPhotoUpload(id){state.currentPhotoId=id;document.getElementById('file-input').click();}

async function handlePhotos(e){
  const files=[...e.target.files];
  const item=state.items.find(i=>i.id===state.currentPhotoId);
  if(!item)return;
  for(const f of files){
    const dataUrl=await readFile(f);
    item.photos.push(dataUrl);
    item.photoIds.push(null);
    render();
    const idx=item.photos.length-1;
    if(state.driveConnected){
      setStatus2('Uploading photo to Drive...');
      const mod=document.getElementById('mod-input').value||'MOD';
      const fname=`${mod}_item${item.id}_${Date.now()}.jpg`;
      const driveId=await uploadPhotoToDrive(item.id,dataUrl,fname);
      item.photoIds[idx]=driveId;
      setStatus2('Photo saved to Drive ✓');
      autoSave();
    }
  }
  e.target.value='';
}

function readFile(f){return new Promise(res=>{const r=new FileReader();r.onload=e=>res(e.target.result);r.readAsDataURL(f);});}

function openLightbox(src){document.getElementById('lightbox-img').src=src;document.getElementById('lightbox').classList.add('open');}
function closeLightbox(e){if(e.target===document.getElementById('lightbox'))document.getElementById('lightbox').classList.remove('open');}

function setFilter(f,btn){
  state.filter=f;
  document.querySelectorAll('.filter-btn').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');
  render();
}

function updateMeta(){document.getElementById('mod-sub').textContent='Module: '+(document.getElementById('mod-input').value||'—');}

function updateStats(){
  const ok=state.items.filter(i=>i.status==='accepted').length;
  const rej=state.items.filter(i=>i.status==='rejected').length;
  const pend=state.items.filter(i=>i.status==='pending').length;
  const photos=state.items.reduce((s,i)=>s+i.photos.length,0);
  document.getElementById('s-ok').textContent=ok;
  document.getElementById('s-rej').textContent=rej;
  document.getElementById('s-pend').textContent=pend;
  document.getElementById('s-photos').textContent=photos;
  const total=state.items.length,done=ok+rej,pct=total?Math.round(done/total*100):0;
  document.getElementById('prog-fill').style.width=pct+'%';
  document.getElementById('prog-text').textContent=`${done} of ${total} checked (${pct}%)`;
}

function addItem(){
  const sec=document.getElementById('new-section').value.trim();
  const desc=document.getElementById('new-desc').value.trim();
  if(!sec||!desc){alert('Please fill in section and description.');return;}
  const maxId=Math.max(...state.items.map(i=>i.id),0);
  state.items.push({id:maxId+1,section:sec,desc,status:'pending',notes:'',acceptedDate:'',rejectedDate:'',photos:[],photoIds:[]});
  document.getElementById('new-section').value='';
  document.getElementById('new-desc').value='';
  render();autoSave();
}

function exportProtocol(){
  const mod=document.getElementById('mod-input').value||'—';
  const inspector=document.getElementById('inspector-input').value||'—';
  const pm=document.getElementById('pm-input').value||'—';
  const date=document.getElementById('date-input').value?new Date(document.getElementById('date-input').value).toLocaleDateString('en-GB'):new Date().toLocaleDateString('en-GB');
  const ok=state.items.filter(i=>i.status==='accepted').length;
  const rej=state.items.filter(i=>i.status==='rejected').length;
  const pend=state.items.filter(i=>i.status==='pending').length;
  const overall=rej===0&&pend===0?'ACCEPTED':rej>0?'NOT ACCEPTED':'IN PROGRESS';
  const oColor=overall==='ACCEPTED'?'#1D9E75':overall==='NOT ACCEPTED'?'#E24B4A':'#EF9F27';
  let rows='';
  state.items.forEach(i=>{
    const sLbl=i.status==='accepted'?'Quality accepted':i.status==='rejected'?'Rejected':'—';
    const sColor=i.status==='accepted'?'#1D9E75':i.status==='rejected'?'#E24B4A':'#888';
    rows+=`<tr><td style="padding:5px 7px;border:0.5px solid #ccc;text-align:center;font-size:11px">${i.id}</td><td style="padding:5px 7px;border:0.5px solid #ccc;font-size:11px;color:#555">${i.section}</td><td style="padding:5px 7px;border:0.5px solid #ccc;font-size:11px">${i.desc}</td><td style="padding:5px 7px;border:0.5px solid #ccc;font-size:11px"></td><td style="padding:5px 7px;border:0.5px solid #ccc;font-size:11px;text-align:center;color:#E24B4A">${i.rejectedDate||''}</td><td style="padding:5px 7px;border:0.5px solid #ccc;font-size:11px;text-align:center;color:#1D9E75">${i.acceptedDate||''}</td><td style="padding:5px 7px;border:0.5px solid #ccc;font-size:11px;text-align:center"></td><td style="padding:5px 7px;border:0.5px solid #ccc;font-size:11px;color:${sColor};text-align:center">${sLbl}</td><td style="padding:5px 7px;border:0.5px solid #ccc;font-size:11px">${i.notes||''}</td></tr>`;
  });
  const withPhotos=state.items.filter(i=>i.photos.length>0);
  let photoSec='';
  if(withPhotos.length>0){
    photoSec=`<div style="margin-top:48px;page-break-before:always"><h2 style="font-size:15px;font-weight:700;margin-bottom:18px;padding-bottom:8px;border-bottom:2px solid #333">Photo documentation — Appendix</h2>`;
    withPhotos.forEach(i=>{
      photoSec+=`<div style="margin-bottom:28px"><p style="font-size:12px;font-weight:700;margin-bottom:4px">No. ${i.id} — ${i.section}</p><p style="font-size:11px;color:#555;margin-bottom:10px">${i.desc}</p><div style="display:flex;flex-wrap:wrap;gap:14px">`;
      i.photos.forEach((p,idx)=>{photoSec+=`<figure style="margin:0"><img src="${p}" style="width:230px;height:172px;object-fit:cover;border-radius:5px;border:1px solid #ddd;display:block"/><figcaption style="font-size:10px;color:#999;margin-top:3px;text-align:center">Photo ${idx+1}</figcaption></figure>`;});
      photoSec+='</div></div>';
    });
    photoSec+='</div>';
  }
  const html=`<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8"><title>QC-3 — Module ${mod}</title><style>body{font-family:Arial,sans-serif;max-width:980px;margin:0 auto;padding:28px;color:#333}table{border-collapse:collapse;width:100%}th{background:#f0f0f0;font-size:11px;font-weight:700}@media print{body{padding:10px}@page{margin:12mm}}</style></head><body>
<div style="display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:22px;padding-bottom:12px;border-bottom:2px solid #333">
<div><div style="font-size:11px;color:#888;margin-bottom:4px">Project: ISL RDK Cabins &nbsp;|&nbsp; Address: Iceland</div><h1 style="font-size:18px;font-weight:700;margin-bottom:6px">MODULE CHECKLIST &nbsp; No. QC-3</h1><p style="font-size:12px">Module No.: <strong>${mod}</strong> &nbsp;&nbsp; Date: <strong>${date}</strong></p></div>
<div style="text-align:right"><div style="font-size:20px;font-weight:700;color:${oColor};border:2px solid ${oColor};padding:6px 18px;border-radius:4px">${overall}</div></div>
</div>
<table style="margin-bottom:30px"><thead><tr>
<th style="padding:7px;border:0.5px solid #ccc;width:28px">No.</th>
<th style="padding:7px;border:0.5px solid #ccc;width:100px">Section</th>
<th style="padding:7px;border:0.5px solid #ccc">Works to be tested</th>
<th style="padding:7px;border:0.5px solid #ccc;width:90px">Name / surname</th>
<th style="padding:7px;border:0.5px solid #ccc;width:68px">Quality rejected, date</th>
<th style="padding:7px;border:0.5px solid #ccc;width:68px">Quality accepted, date</th>
<th style="padding:7px;border:0.5px solid #ccc;width:80px">Signature / stamp</th>
<th style="padding:7px;border:0.5px solid #ccc;width:75px">Status</th>
<th style="padding:7px;border:0.5px solid #ccc;width:100px">Notes</th>
</tr></thead><tbody>${rows}</tbody></table>
<div style="background:#f9f9f9;border:1px solid #ddd;border-radius:4px;padding:13px 17px;margin-bottom:26px"><p style="font-weight:700;font-size:13px;margin-bottom:8px">Meets quality requirements!</p><p style="font-size:12px;margin-bottom:2px">Quality controller: <strong>${inspector}</strong></p><p style="font-size:11px;color:#777">name, surname, signature / stamp</p></div>
<div style="border:1px solid #ccc;border-radius:4px;padding:13px 17px;margin-bottom:26px"><p style="font-weight:700;font-size:13px;margin-bottom:10px">MODULE ACCEPTANCE: name, surname, signature / stamp</p><p style="font-size:12px;margin-bottom:4px">1. Project manager: <strong>${pm}</strong></p><p style="font-size:12px;margin-bottom:14px">2. Quality controller: <strong>${inspector}</strong></p>
<div style="display:flex;gap:14px;align-items:center"><span style="font-weight:700;font-size:12px">CHECK BY THE PROJECT MANAGER:</span><span style="border:1px solid #333;padding:4px 14px;font-size:12px;font-weight:700;color:${overall==='ACCEPTED'?'#1D9E75':'#333'}">${overall==='ACCEPTED'?'☑':'☐'} ACCEPTED</span><span style="border:1px solid #333;padding:4px 14px;font-size:12px;font-weight:700;color:${overall==='NOT ACCEPTED'?'#E24B4A':'#333'}">${overall==='NOT ACCEPTED'?'☑':'☐'} NOT ACCEPTED</span></div>
<div style="margin-top:18px;border-top:1px solid #999;padding-top:6px;width:200px;font-size:11px;color:#777">Signature:</div></div>
${photoSec}</body></html>`;
  const blob=new Blob([html],{type:'text/html'});
  const url=URL.createObjectURL(blob);
  const a=document.createElement('a');a.href=url;a.download=`QC3_${mod}_${date.replace(/\//g,'-')}.html`;a.click();URL.revokeObjectURL(url);
}

document.getElementById('date-input').valueAsDate=new Date();
render();
</script>
