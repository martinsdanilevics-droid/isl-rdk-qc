<head>

<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:Arial,sans-serif;font-size:14px;color:#333;background:#f5f5f5;min-height:100vh}
.top-bar{background:#1a1a2e;color:#fff;padding:12px 20px;display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:8px;position:sticky;top:0;z-index:100}
.top-bar-left{display:flex;align-items:center;gap:14px;flex-wrap:wrap}
.top-bar-title{font-size:15px;font-weight:700}

.top-bar-right{display:flex;gap:8px;align-items:center;flex-wrap:wrap}
.module-select{padding:7px 12px;border-radius:8px;border:1px solid rgba(255,255,255,0.3);background:rgba(255,255,255,0.1);color:#fff;font-size:13px;cursor:pointer;font-family:Arial}
.module-select option{background:#1a1a2e;color:#fff}
.drive-btn{font-size:12px;padding:6px 14px;border-radius:20px;border:1px solid rgba(255,255,255,0.3);cursor:pointer;background:transparent;color:#fff;font-family:Arial}

.btn-export{padding:7px 16px;border:1px solid #1D9E75;border-radius:8px;background:#1D9E75;color:#fff;font-size:13px;cursor:pointer;font-family:Arial;font-weight:700}
.btn-export:hover{background:#178a64}
.save-status{font-size:11px;color:#aaa}
.container{max-width:960px;margin:0 auto;padding:16px}
.drive-info{background:#e8f4ff;border:1px solid #b3d4f5;border-radius:8px;padding:10px 14px;font-size:12px;color:#1a5a8a;margin-bottom:14px}
.module-tabs{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:14px}
.module-tab{padding:5px 14px;border:1px solid #ddd;border-radius:20px;background:#fff;color:#666;font-size:12px;cursor:pointer;transition:all 0.15s}
.module-tab:hover{background:#f0f0f0}
.module-tab.active{background:#1a1a2e;border-color:#1a1a2e;color:#fff;font-weight:700}
.module-tab.has-data{border-color:#1D9E75;color:#1D9E75}
.module-tab.has-data.active{background:#1a1a2e;color:#fff;border-color:#1a1a2e}
.card{background:#fff;border-radius:10px;border:1px solid #e0e0e0;padding:16px 20px;margin-bottom:14px}
.meta-row{display:flex;gap:10px;flex-wrap:wrap;margin-bottom:14px}
.meta-row input{flex:1;min-width:150px;padding:8px 12px;border:1px solid #ddd;border-radius:8px;font-size:13px;font-family:Arial}
.meta-row input:focus{outline:none;border-color:#1a1a2e}
.stats{display:grid;grid-template-columns:repeat(auto-fit,minmax(90px,1fr));gap:8px;margin-bottom:14px}
.stat{background:#f8f8f8;border-radius:8px;padding:10px;text-align:center;border:1px solid #eee}
.stat .val{font-size:22px;font-weight:700}
.stat .lbl{font-size:11px;color:#888;margin-top:2px}
.stat.ok .val{color:#1D9E75}
.stat.rej .val{color:#E24B4A}
.stat.pend .val{color:#EF9F27}
.progress-bar{background:#eee;border-radius:4px;height:7px;overflow:hidden;margin-bottom:4px}
.progress-fill{height:100%;background:#1D9E75;border-radius:4px;transition:width 0.4s}
.prog-text{font-size:12px;color:#888;margin-bottom:14px}
.filters{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:14px}
.filter-btn{padding:5px 14px;border:1px solid #ddd;border-radius:20px;background:#fff;color:#666;font-size:12px;cursor:pointer}
.filter-btn.active{background:#1a1a2e;border-color:#1a1a2e;color:#fff}
.section-label{font-size:11px;font-weight:700;color:#888;text-transform:uppercase;letter-spacing:0.6px;padding:10px 0 5px;margin-top:4px}
.item{background:#fff;border:1px solid #e0e0e0;border-radius:10px;padding:13px 15px;margin-bottom:8px}
.item.accepted{border-left:4px solid #1D9E75}
.item.rejected{border-left:4px solid #E24B4A}
.item-top{display:flex;align-items:flex-start;gap:10px}
.item-num{font-size:11px;font-weight:700;color:#aaa;min-width:24px;padding-top:2px}
.item-sec-badge{font-size:10px;padding:2px 8px;border-radius:10px;background:#f0f0f0;color:#666;white-space:nowrap;flex-shrink:0;margin-top:1px}
.item-desc{flex:1;font-size:13px;line-height:1.5}
.item-actions{display:flex;gap:6px;align-items:center;margin-top:10px;flex-wrap:wrap}
.btn-accept{padding:5px 13px;border:1px solid #ccc;border-radius:7px;font-size:12px;cursor:pointer;background:#fff;color:#555;font-family:Arial}
.btn-accept:hover{background:#f0faf5}
.btn-accept.active{background:#e6f7f0;border-color:#1D9E75;color:#1D9E75;font-weight:700}
.btn-reject{padding:5px 13px;border:1px solid #ccc;border-radius:7px;font-size:12px;cursor:pointer;background:#fff;color:#555;font-family:Arial}
.btn-reject:hover{background:#fff5f5}
.btn-reject.active{background:#fef0f0;border-color:#E24B4A;color:#E24B4A;font-weight:700}
.btn-photo{padding:5px 11px;border:1px dashed #aaa;border-radius:7px;font-size:12px;cursor:pointer;background:transparent;color:#666;font-family:Arial}
.btn-photo:hover{background:#f5f5f5}
.notes-inp{flex:1;min-width:130px;padding:5px 10px;border:1px solid #ddd;border-radius:7px;font-size:12px;font-family:Arial}
.notes-inp:focus{outline:none;border-color:#1a1a2e}
.btn-del{padding:4px 9px;border:1px solid #fcc;border-radius:7px;font-size:11px;cursor:pointer;background:#fff8f8;color:#E24B4A;font-family:Arial}
.btn-na{padding:5px 13px;border:1px solid #ccc;border-radius:7px;font-size:12px;cursor:pointer;background:#fff;color:#888;font-family:Arial}
.btn-na:hover{background:#f5f5f5}
.btn-na.active{background:#f0f0f0;border-color:#888;color:#555;font-weight:700}
.item.na{border-left:4px solid #aaa;opacity:0.7}
.photos-row{display:flex;flex-wrap:wrap;gap:6px;margin-top:8px}
.thumb{position:relative;width:68px;height:68px;border-radius:7px;overflow:hidden;border:1px solid #ddd;flex-shrink:0}
.thumb img{width:100%;height:100%;object-fit:cover;cursor:pointer;display:block}
.thumb .del-p{position:absolute;top:2px;right:2px;background:rgba(0,0,0,0.65);border:none;color:#fff;border-radius:3px;padding:1px 5px;font-size:10px;cursor:pointer;line-height:1.5}
.add-form{background:#f9f9f9;border:1px solid #e0e0e0;border-radius:10px;padding:15px;margin-top:10px}
.add-form h3{font-size:13px;font-weight:700;margin-bottom:10px;color:#444}
.add-form .row{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:8px}
.add-form input,.add-form textarea{padding:7px 10px;border:1px solid #ddd;border-radius:7px;background:#fff;font-size:13px;font-family:Arial}
.add-form input:focus,.add-form textarea:focus{outline:none;border-color:#1a1a2e}
.btn-add{padding:8px 18px;border:1px solid #1a1a2e;border-radius:7px;background:#1a1a2e;color:#fff;font-size:13px;cursor:pointer;font-family:Arial}
.lightbox{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.88);z-index:9999;align-items:center;justify-content:center}
.lightbox.open{display:flex}
.lightbox img{max-width:92%;max-height:92%;border-radius:8px}
.lightbox-close{position:absolute;top:16px;right:20px;color:#fff;font-size:32px;cursor:pointer;background:none;border:none;line-height:1}
.overview-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(130px,1fr));gap:10px;margin-bottom:16px}
.overview-card{background:#fff;border:1px solid #e0e0e0;border-radius:10px;padding:12px;text-align:center;cursor:pointer;transition:all 0.15s}
.overview-card:hover{border-color:#1a1a2e}
.overview-card.active-mod{border-color:#1a1a2e;border-width:2px}
.overview-card .mod-name{font-size:14px;font-weight:700;margin-bottom:6px}
.overview-card .mod-ok{color:#1D9E75;font-size:12px}
.overview-card .mod-rej{color:#E24B4A;font-size:12px}
.overview-card .mod-pend{color:#EF9F27;font-size:12px}
.overview-card .mod-bar{background:#eee;border-radius:3px;height:4px;margin-top:6px;overflow:hidden}
.overview-card .mod-bar-fill{height:100%;background:#1D9E75;border-radius:3px}
@media(max-width:600px){.item-actions{gap:4px}.meta-row input{min-width:100%}}
</style>
</head>
<body>

<div class="top-bar">
  <div class="top-bar-left">

      <div class="top-bar-title" id="project-title">ISL RDK Cabins — QC-3</div>

</div>

<div class="container">

        <div class="stat"><div class="val" id="s-na">0</div><div class="lbl">N/A</div></div>
    <div class="stat"><div class="val" id="s-photos">0</div><div class="lbl">Photos</div></div>

  </div>

</div>

<div id="photo-modal" style="display:none;position:fixed;inset:0;background:rgba(0,0,0,0.6);z-index:9998;align-items:flex-end;justify-content:center">

</div>
<div class="lightbox" id="lightbox" onclick="closeLightbox(event)">

const SCOPES='https://www.googleapis.com/auth/drive.file';
const FOLDER_NAME='ISL_RDK_QC';

    modules:['CS 0-1','CS 0-2','CS 0-3','CS 0-4','CS 0-5','CS 0-6','CS 0-7','CS 0-8',
             'CS 1-1','CS 1-2','CS 1-3','CS 1-4','CS 1-5','CS 1-6','CS 1-7','CS 1-8',
             'CS 2-1','CS 2-2','CS 2-3','CS 2-4','CS 2-5','CS 2-6','CS 2-7','CS 2-8']

let currentProject='ISL_RDK';
function getProjectCfg(){return PROJECTS[currentProject];}
const MODULE_NAMES=PROJECTS['ISL_RDK'].modules;// legacy ref

const ITEMS_TEMPLATE=[
  {id:1,section:"Water supply, HVAC",desc:"Water supply and heating networks have been installed in accordance with the drawings. Pipes are marked, and pipe ends are sealed. (Panel table, 1 station)"},
  {id:2,section:"Water supply, HVAC",desc:"Sewage pipes have been securely fixed with correct slopes. Pipe ends are properly sealed. Sewage pipe water test has been completed."},

  {id:21,section:"Frame exterior finish",desc:"External wall thermal insulation has been properly installed with no gaps. Specified insulation properties, such as thermal conductivity (λ) and thickness, have been observed and confirmed."},

function freshItems(){return ITEMS_TEMPLATE.map(i=>({...i,status:'pending',notes:'',acceptedDate:'',rejectedDate:'',photos:[],photoIds:[]}));}

// modules[modName] = { meta:{inspector,pm,date}, items:[...] }
let modules={};
MODULE_NAMES.forEach(n=>{modules[n]={meta:{inspector:'',pm:'',date:''},items:freshItems()};});

let currentModule=null;
let filter='all';
let currentPhotoItemId=null;
let driveConnected=false;
let folderId=null;
let driveFileIds={};// modName -> fileId

function getModState(){return currentModule?modules[currentModule]:null;}

// ---- DROPDOWN + OVERVIEW ----
function switchProject(projKey){
  if(!PROJECTS[projKey]) return;
  currentProject=projKey;
  // reset module selection
  currentModule=null;
  document.getElementById('module-content').style.display='none';
  // reinit dropdown with new modules
  const sel=document.getElementById('module-select');
  sel.innerHTML='<option value="">— Select module —</option>';
  PROJECTS[projKey].modules.forEach(n=>{
    const o=document.createElement('option');
    o.value=n;o.textContent=n;
    sel.appendChild(o);
  });
  // init modules state for this project if not yet done
  PROJECTS[projKey].modules.forEach(n=>{
    if(!modules[n]) modules[n]={meta:{inspector:'',pm:'',date:''},items:freshItems()};
  });
  // update folder and reload from drive
  if(driveConnected){

// ---- RENDER ----
function render(){
  const mod=getModState();
  if(!mod) return;
  const list=document.getElementById('checklist');
  const sections={};
  const filtered=mod.items.filter(i=>{
    if(filter==='pending') return i.status==='pending';
    if(filter==='accepted') return i.status==='accepted';
    if(filter==='rejected') return i.status==='rejected';
    if(filter==='photos') return (i.photoIds||[]).filter(Boolean).length>0;
    if(filter==='na') return i.status==='na';
    return true;
  });
  filtered.forEach(i=>{if(!sections[i.section])sections[i.section]=[];sections[i.section].push(i);});
  let html='';
  Object.entries(sections).forEach(([sec,items])=>{
    html+=`<div class="section-label">${sec}</div>`;
    items.forEach(i=>{
      const cls=i.status==='accepted'?'accepted':i.status==='rejected'?'rejected':i.status==='na'?'na':'';
      html+=`<div class="item ${cls}">
        <div class="item-top">
          <span class="item-num">#${i.id}</span>
          <span class="item-sec-badge">${i.section}</span>
          <span class="item-desc">${i.desc}</span>
        </div>
        <div class="item-actions">
          <button class="btn-accept ${i.status==='accepted'?'active':''}" onclick="setItemStatus(${i.id},'accepted')">&#10003; Quality accepted</button>
          <button class="btn-reject ${i.status==='rejected'?'active':''}" onclick="setItemStatus(${i.id},'rejected')">&#10007; Rejected</button>
          <button class="btn-na ${i.status==='na'?'active':''}" onclick="setItemStatus(${i.id},'na')">N/A</button>
          <button class="btn-photo" onclick="openPhotoUpload(${i.id})">&#128247; Photo (${(i.photoIds||[]).filter(Boolean).length+(i.photoPreviews||[]).filter(p=>p.uploading).length})</button>
          ${(keepShooting&&currentPhotoItemId===i.id)?'<button style=\"padding:5px 10px;border:1px solid #ffc107;border-radius:7px;background:#fff3cd;color:#856404;font-size:12px;cursor:pointer\" onclick=\"stopShooting()\">Stop</button>':''}
          ${i.status==='accepted'?`<input type="date" style="padding:4px 8px;border:1px solid #1D9E75;border-radius:7px;font-size:11px;color:#1D9E75;background:#f0faf5;font-family:Arial" value="${dateToISO(i.acceptedDate)}" onchange="setItemDateFromInput(${i.id},'acceptedDate',this.value)" title="Accepted date"/>`:'' }
          ${i.status==='rejected'?`<input type="date" style="padding:4px 8px;border:1px solid #E24B4A;border-radius:7px;font-size:11px;color:#E24B4A;background:#fef0f0;font-family:Arial" value="${dateToISO(i.rejectedDate)}" onchange="setItemDateFromInput(${i.id},'rejectedDate',this.value)" title="Rejected date"/>`:'' }
          <input class="notes-inp" type="text" placeholder="Notes..." value="${escH(i.notes)}" onchange="setNotes(${i.id},this.value)"/>
          <button class="btn-del" onclick="delItem(${i.id})">&#128465;</button>
        </div>`;
      const previews=i.photoPreviews||[];
      const driveOnlyIds=(i.photoIds||[]).filter((_,ix)=>!previews[ix]);
      if(previews.length>0||driveOnlyIds.length>0){
        html+=`<div class="photos-row">`;
        previews.forEach((pv,idx)=>{
          if(pv.uploading){
            html+=`<div class="thumb"><div style="width:100%;height:100%;display:flex;align-items:center;justify-content:center;font-size:10px;color:#888;background:#f5f5f5">Uploading...</div></div>`;
          } else {
            const viewUrl=`https://drive.google.com/thumbnail?id=${pv.driveId}&sz=w200`;
            const fullUrl=`https://drive.google.com/file/d/${pv.driveId}/view`;
            html+=`<div class="thumb"><img src="${viewUrl}" onclick="window.open('${fullUrl}','_blank')" alt="Photo ${idx+1}" onerror="this.src='${pv.dataUrl}'"/><button class="del-p" onclick="delPhoto(${i.id},${idx})">&#10005;</button></div>`;
          }
        });
        html+='</div>';
      }
      html+='</div>';
    });
  });
  list.innerHTML=html||'<p style="color:#aaa;padding:20px;text-align:center">No matching items</p>';
  updateStats();
}

function escH(s){return String(s).replace(/&/g,'&amp;').replace(/"/g,'&quot;').replace(/</g,'&lt;');}
function dateToISO(d){
  if(!d) return '';
  const parts=d.split('/');
  if(parts.length===3) return `${parts[2]}-${parts[1].padStart(2,'0')}-${parts[0].padStart(2,'0')}`;
  return '';
}
function setItemDateFromInput(id,field,isoVal){
  if(!isoVal) return;
  const parts=isoVal.split('-');
  const formatted=`${parts[2]}/${parts[1]}/${parts[0]}`;
  setItemDate(id,field,formatted);
}

function setItemStatus(id,s){
  const mod=getModState();if(!mod)return;
  const item=mod.items.find(i=>i.id===id);if(!item)return;

  if(item.status===s){item.status='pending';item.acceptedDate='';item.rejectedDate='';}
  else{
    item.status=s;
    if(s==='accepted'){item.acceptedDate=item.acceptedDate||now;item.rejectedDate='';}
    else if(s==='rejected'){item.rejectedDate=item.rejectedDate||now;item.acceptedDate='';}
    else{item.acceptedDate='';item.rejectedDate='';}
  }
  render();renderOverview();autoSave();
}

function delItem(id){if(!confirm('Delete this item?'))return;const mod=getModState();if(!mod)return;mod.items=mod.items.filter(i=>i.id!==id);render();autoSave();}
function delPhoto(id,idx){const mod=getModState();if(!mod)return;const i=mod.items.find(i=>i.id===id);if(i){if(i.photoPreviews)i.photoPreviews.splice(idx,1);i.photoIds.splice(idx,1);render();autoSave();}}

// Read EXIF date from image
function getExifDate(file){
  return new Promise(resolve=>{
    const reader=new FileReader();
    reader.onload=e=>{
      const view=new DataView(e.target.result);
      if(view.getUint16(0,false)!==0xFFD8){resolve(null);return;}
      let offset=2;
      while(offset<view.byteLength){
        if(view.getUint16(offset,false)===0xFFE1){
          const exifLength=view.getUint16(offset+2,false);
          const exifData=new DataView(e.target.result,offset+4,exifLength-2);
          if(String.fromCharCode(...[69,120,105,102])!==
            String.fromCharCode(exifData.getUint8(0),exifData.getUint8(1),exifData.getUint8(2),exifData.getUint8(3))){resolve(null);return;}
          const littleEndian=exifData.getUint16(6)===0x4949;
          const ifdOffset=exifData.getUint32(10,littleEndian)+6;
          const entries=exifData.getUint16(ifdOffset,littleEndian);
          for(let i=0;i<entries;i++){
            const tag=exifData.getUint16(ifdOffset+2+i*12,littleEndian);
            if(tag===0x9003||tag===0x0132){// DateTimeOriginal or DateTime
              const valOffset=exifData.getUint32(ifdOffset+2+i*12+8,littleEndian)+6;
              let str='';
              for(let j=0;j<19;j++) str+=String.fromCharCode(exifData.getUint8(valOffset+j));
              // format: "2026:06:12 16:50:00" -> "12/06/2026"
              const p=str.split(' ')[0].split(':');
              if(p.length===3) resolve(`${p[2]}/${p[1]}/${p[0]}`);
              else resolve(null);
              return;
            }
          }
          resolve(null);return;
        }
        offset+=2+view.getUint16(offset+2,false);
      }
      resolve(null);
    };
    reader.onerror=()=>resolve(null);
    reader.readAsArrayBuffer(file.slice(0,65536));
  });
}

async function handlePhotos(e){
  const files=[...e.target.files];
  const mod=getModState();if(!mod)return;
  const item=mod.items.find(i=>i.id===currentPhotoItemId);if(!item)return;
  if(!driveConnected||!folderId){setStatus('Connect Google Drive first.');e.target.value='';return;}
  item.photoPreviews=item.photoPreviews||[];
  // 1. Show all previews immediately — no waiting
  const newPreviews=[];
  for(const f of files){
    let dataUrl;
    try{dataUrl=await readFile(f);}catch(err){continue;}
    const previewId='p_'+Date.now()+'_'+Math.random().toString(36).slice(2);
    item.photoIds.push(null);
    item.photoPreviews.push({previewId,dataUrl,uploading:true,driveId:null});
    newPreviews.push({previewId,dataUrl,item});
  }
  render();
  setStatus(`${newPreviews.length} photo${newPreviews.length>1?'s':''} added — uploading in background...`);
  e.target.value='';
  // 2. Upload in background — user can keep working
  for(const {previewId,dataUrl,item} of newPreviews){
    const pv=item.photoPreviews.find(p=>p.previewId===previewId);
    if(!pv) continue;
    let driveId=null,retries=3;
    while(retries>0&&!driveId){
      try{
        const fname=`${currentModule}_item${item.id}_${Date.now()}.jpg`;
        driveId=await uploadPhotoToDrive(dataUrl,fname);
      }catch(err){retries--;if(retries>0)await new Promise(r=>setTimeout(r,1500));}
    }
    if(driveId){
      pv.uploading=false;pv.driveId=driveId;
      const ixId=item.photoIds.findIndex((_,i)=>item.photoPreviews[i]&&item.photoPreviews[i].previewId===previewId);
      if(ixId>=0) item.photoIds[ixId]=driveId;
      render();
    } else {
      item.photoPreviews=item.photoPreviews.filter(p=>p.previewId!==previewId);
      render();
    }
  }
  const uploaded=item.photoPreviews.filter(p=>!p.uploading).length;
  setStatus(`Upload complete — ${uploaded} photo${uploaded>1?'s':''} saved ✓`);
  autoSave();
}

function readFile(f){return new Promise(res=>{const r=new FileReader();r.onload=e=>res(e.target.result);r.readAsDataURL(f);});}
function openLightbox(src){document.getElementById('lightbox-img').src=src;document.getElementById('lightbox').classList.add('open');}

// ---- GOOGLE DRIVE ----
let tokenClient,gapiInited=false,gisInited=false;
let moduleFolderIds={};

async function ensureModuleFolder(modName){
  if(moduleFolderIds[modName]) return moduleFolderIds[modName];
  if(!folderId) return null;
  try{
    let res=await gapi.client.request({path:'https://www.googleapis.com/drive/v3/files',params:{q:`name='${modName}' and '${folderId}' in parents and mimeType='application/vnd.google-apps.folder' and trashed=false`,fields:'files(id)'}});
    if(res.result.files&&res.result.files.length>0){
      moduleFolderIds[modName]=res.result.files[0].id;
    } else {
      let cr=await gapi.client.request({path:'https://www.googleapis.com/drive/v3/files',method:'POST',body:{name:modName,mimeType:'application/vnd.google-apps.folder',parents:[folderId]}});
      moduleFolderIds[modName]=cr.result.id;
    }
    return moduleFolderIds[modName];
  }catch(e){console.error('Subfolder error:',e);return folderId;}
}

function gapiLoaded(){
  gapi.load('client',async()=>{
    await gapi.client.init({});
    gapiInited=true;maybeEnableDrive();
  });
}
function gisLoaded(){
  tokenClient=google.accounts.oauth2.initTokenClient({client_id:CLIENT_ID,scope:SCOPES,callback:''});
  gisInited=true;maybeEnableDrive();
}
function maybeEnableDrive(){
  if(gapiInited&&gisInited){
    const saved=localStorage.getItem('qc_drive_token');
    if(saved){gapi.client.setToken(JSON.parse(saved));driveConnected=true;updateDriveUI(true);ensureFolderAndLoad();}
  }
}
function handleDriveAuth(){
  tokenClient.callback=async(resp)=>{
    if(resp.error)return;
    localStorage.setItem('qc_drive_token',JSON.stringify(gapi.client.getToken()));
    driveConnected=true;updateDriveUI(true);setStatus('Connected to Google Drive');
    await ensureFolderAndLoad();
  };
  tokenClient.requestAccessToken({prompt:'consent'});
}
function updateDriveUI(connected){
  const btn=document.getElementById('drive-btn');
  const info=document.getElementById('drive-info');
  btn.textContent=connected?'✓ Google Drive connected':'⬤ Connect Google Drive';
  btn.className=connected?'drive-btn connected':'drive-btn';
  info.style.display=connected?'block':'none';
}

async function ensureFolderAndLoad(){
  try{
    setStatus('Checking Drive folder...');
    const activeFolderName=getProjectCfg().folder;let res=await gapi.client.request({path:'https://www.googleapis.com/drive/v3/files',params:{q:`name='${activeFolderName}' and mimeType='application/vnd.google-apps.folder' and trashed=false`,fields:'files(id,name,webViewLink)'}});
    let files=res.result.files;
    if(files&&files.length>0){
      folderId=files[0].id;
      document.getElementById('drive-folder-link').innerHTML=`<a href="${files[0].webViewLink}" target="_blank">Open in Drive</a>`;
    } else {
      let cr=await gapi.client.request({path:'https://www.googleapis.com/drive/v3/files',method:'POST',body:{name:activeFolderName,mimeType:'application/vnd.google-apps.folder'}});
      folderId=cr.result.id;
    }
    await loadAllFromDrive();
  }catch(e){setStatus('Drive error: '+e.message);}
}

async function loadAllFromDrive(){
  setStatus('Loading modules from Drive...');
  for(const modName of getProjectCfg().modules){
    await loadModuleFromDrive(modName);
  }
  setStatus('All modules loaded ✓');
  if(currentModule) render();
  renderOverview();
}

async function loadModuleFromDrive(modName){
  try{
    const fname=`qc_${modName.replace('-','')}.json`;
    let res=await gapi.client.request({path:'https://www.googleapis.com/drive/v3/files',params:{q:`name='${fname}' and trashed=false`,fields:'files(id,name)'}});
    let files=res.result.files;
    if(files&&files.length>0){
      driveFileIds[modName]=files[0].id;
      let dl=await gapi.client.request({path:`https://www.googleapis.com/drive/v3/files/${files[0].id}`,params:{alt:'media'}});
      const saved=dl.result;
      if(saved&&saved.items){
        saved.items.forEach(si=>{
          let cur=modules[modName].items.find(i=>i.id===si.id);
          if(cur){
            cur.status=si.status||'pending';cur.notes=si.notes||'';
            cur.acceptedDate=si.acceptedDate||'';cur.rejectedDate=si.rejectedDate||'';
            const ids=(si.photoIds||[]).filter(Boolean);
            cur.photoIds=ids;
            cur.photoPreviews=ids.map(did=>({previewId:did,driveId:did,uploading:false,dataUrl:''}));
          }
        });
      }
      if(saved&&saved.meta) modules[modName].meta=saved.meta;
    }
  }catch(e){console.warn('Load error for '+modName,e);}
}

async function saveToDrive(){
  if(!driveConnected){alert('Please connect Google Drive first.');return;}
  if(!currentModule){alert('Please select a module first.');return;}
  // save current meta
  modules[currentModule].meta.inspector=document.getElementById('inspector-input').value;
  modules[currentModule].meta.pm=document.getElementById('pm-input').value;
  modules[currentModule].meta.date=document.getElementById('date-input').value;
  setStatus('Saving...');
  try{
    const modName=currentModule;
    const fname=`qc_${modName.replace('-','')}.json`;
    const payload={meta:modules[modName].meta,items:modules[modName].items.map(i=>({id:i.id,section:i.section,desc:i.desc,status:i.status,notes:i.notes,acceptedDate:i.acceptedDate,rejectedDate:i.rejectedDate,photoIds:(i.photoIds||[]).filter(Boolean)}))};
    const body=JSON.stringify(payload);
    if(driveFileIds[modName]){
      await gapi.client.request({path:`https://www.googleapis.com/upload/drive/v3/files/${driveFileIds[modName]}`,method:'PATCH',params:{uploadType:'media'},headers:{'Content-Type':'application/json'},body});
    } else {
      const modSubFolder=(await ensureModuleFolder(modName))||folderId;
      const meta={name:fname,parents:[modSubFolder]};
      const boundary='bound_xyz';
      const mp=`--${boundary}\r\nContent-Type: application/json\r\n\r\n${JSON.stringify(meta)}\r\n--${boundary}\r\nContent-Type: application/json\r\n\r\n${body}\r\n--${boundary}--`;
      let cr=await gapi.client.request({path:'https://www.googleapis.com/upload/drive/v3/files',method:'POST',params:{uploadType:'multipart'},headers:{'Content-Type':`multipart/related; boundary=${boundary}`},body:mp});
      driveFileIds[modName]=cr.result.id;
    }
    setStatus('Saved ✓ '+new Date().toLocaleTimeString());
    renderOverview();
  }catch(e){setStatus('Save error: '+e.message);}
}

async function uploadPhotoToDrive(dataUrl,filename){
  if(!driveConnected||!folderId)return null;
  try{
    const base64=dataUrl.split(',')[1];
    const mime=dataUrl.split(';')[0].split(':')[1];
    const targetFolder=(await ensureModuleFolder(currentModule))||folderId;
    const meta={name:filename,parents:[targetFolder]};
    const boundary='photo_bound';
    const body=`--${boundary}\r\nContent-Type: application/json\r\n\r\n${JSON.stringify(meta)}\r\n--${boundary}\r\nContent-Type: ${mime}\r\nContent-Transfer-Encoding: base64\r\n\r\n${base64}\r\n--${boundary}--`;
    let res=await gapi.client.request({path:'https://www.googleapis.com/upload/drive/v3/files',method:'POST',params:{uploadType:'multipart'},headers:{'Content-Type':`multipart/related; boundary=${boundary}`},body});
    return res.result.id;
  }catch(e){console.error('Photo upload error:',e);return null;}
}

// ---- EXPORT ----
function exportProtocol(){
  if(!currentModule){alert('Please select a module first.');return;}
  const mod=getModState();
  const meta=mod.meta;
  const modName=currentModule;
  const inspector=document.getElementById('inspector-input').value||meta.inspector||'—';
  const pm=document.getElementById('pm-input').value||meta.pm||'—';
  const dateVal=document.getElementById('date-input').value||meta.date;
  const date=dateVal?new Date(dateVal).toLocaleDateString('en-GB'):new Date().toLocaleDateString('en-GB');
  const ok=mod.items.filter(i=>i.status==='accepted').length;
  const rej=mod.items.filter(i=>i.status==='rejected').length;
  const pend=mod.items.filter(i=>i.status==='pending').length;
  const overall=rej===0&&pend===0?'ACCEPTED':rej>0?'NOT ACCEPTED':'IN PROGRESS';
  const oColor=overall==='ACCEPTED'?'#1D9E75':overall==='NOT ACCEPTED'?'#E24B4A':'#EF9F27';
  let rows='';
  mod.items.forEach(i=>{
    const sLbl=i.status==='accepted'?'Quality accepted':i.status==='rejected'?'Rejected':'—';
    const sColor=i.status==='accepted'?'#1D9E75':i.status==='rejected'?'#E24B4A':'#888';
    rows+=`<tr><td style="padding:5px 7px;border:0.5px solid #ccc;text-align:center;font-size:11px">${i.id}</td><td style="padding:5px 7px;border:0.5px solid #ccc;font-size:11px;color:#555">${i.section}</td><td style="padding:5px 7px;border:0.5px solid #ccc;font-size:11px">${i.desc}</td><td style="padding:5px 7px;border:0.5px solid #ccc;font-size:11px"></td><td style="padding:5px 7px;border:0.5px solid #ccc;font-size:11px;text-align:center;color:#E24B4A">${i.rejectedDate||''}</td><td style="padding:5px 7px;border:0.5px solid #ccc;font-size:11px;text-align:center;color:#1D9E75">${i.acceptedDate||''}</td><td style="padding:5px 7px;border:0.5px solid #ccc;font-size:11px;text-align:center"></td><td style="padding:5px 7px;border:0.5px solid #ccc;font-size:11px;color:${sColor};text-align:center">${sLbl}</td><td style="padding:5px 7px;border:0.5px solid #ccc;font-size:11px">${i.notes||''}</td></tr>`;
  });
  const withPhotos=mod.items.filter(i=>(i.photoIds||[]).filter(Boolean).length>0);
  let photoSec='';
  if(withPhotos.length>0){
    photoSec=`<div style="margin-top:48px;page-break-before:always"><h2 style="font-size:15px;font-weight:700;margin-bottom:18px;padding-bottom:8px;border-bottom:2px solid #333">Photo documentation — Appendix</h2>`;
    withPhotos.forEach(i=>{
      photoSec+=`<div style="margin-bottom:28px"><p style="font-size:12px;font-weight:700;margin-bottom:4px">No. ${i.id} — ${i.section}</p><p style="font-size:11px;color:#555;margin-bottom:10px">${i.desc}</p><div style="display:flex;flex-wrap:wrap;gap:14px">`;
      (i.photoIds||[]).filter(Boolean).forEach((did,idx)=>{const thumbUrl=`https://drive.google.com/thumbnail?id=${did}&sz=w400`;const linkUrl=`https://drive.google.com/file/d/${did}/view`;photoSec+=`<figure style="margin:0"><a href="${linkUrl}" target="_blank"><img src="${thumbUrl}" style="width:230px;height:172px;object-fit:cover;border-radius:5px;border:1px solid #ddd;display:block" onerror="this.style.display='none'"/></a><figcaption style="font-size:10px;color:#999;margin-top:3px;text-align:center">Photo ${idx+1} — <a href="${linkUrl}" target="_blank">Open in Drive</a></figcaption></figure>`;});
      photoSec+='</div></div>';
    });
    photoSec+='</div>';
  }
  const html=`<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8"><title>QC-3 — Module ${modName}</title><style>body{font-family:Arial,sans-serif;max-width:980px;margin:0 auto;padding:28px;color:#333}table{border-collapse:collapse;width:100%}th{background:#f0f0f0;font-size:11px;font-weight:700}@media print{body{padding:10px}@page{margin:12mm}}</style></head><body>
<div style="display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:22px;padding-bottom:12px;border-bottom:2px solid #333">
<div><div style="font-size:11px;color:#888;margin-bottom:4px">Project: ISL RDK Cabins &nbsp;|&nbsp; Address: Iceland</div><h1 style="font-size:18px;font-weight:700;margin-bottom:6px">MODULE CHECKLIST &nbsp; No. QC-3 &nbsp;|&nbsp; Module: ${modName}</h1><p style="font-size:12px">Date: <strong>${date}</strong></p></div>
<div style="text-align:right"><div style="font-size:20px;font-weight:700;color:${oColor};border:2px solid ${oColor};padding:6px 18px;border-radius:4px">${overall}</div></div>
</div>
<table style="margin-bottom:30px"><thead><tr>
<th style="padding:7px;border:0.5px solid #ccc;width:28px">No.</th>
<th style="padding:7px;border:0.5px solid #ccc;width:100px">Section</th>
<th style="padding:7px;border:0.5px solid #ccc">Works to be tested</th>
<th style="padding:7px;border:0.5px solid #ccc;width:80px">Quality rejected, date</th>
<th style="padding:7px;border:0.5px solid #ccc;width:80px">Quality accepted, date</th>
<th style="padding:7px;border:0.5px solid #ccc;width:80px">Status</th>
<th style="padding:7px;border:0.5px solid #ccc;">Notes</th>
</tr></thead><tbody>${rows}</tbody></table>
<div style="background:#f9f9f9;border:1px solid #ddd;border-radius:4px;padding:13px 17px;margin-bottom:26px"><p style="font-weight:700;font-size:13px;margin-bottom:8px">Meets quality requirements!</p><p style="font-size:12px;margin-bottom:2px">Quality controller: <strong>${inspector}</strong></p><p style="font-size:11px;color:#777">name, surname, signature / stamp</p></div>
<div style="border:1px solid #ccc;border-radius:4px;padding:13px 17px;margin-bottom:26px"><p style="font-weight:700;font-size:13px;margin-bottom:10px">MODULE ACCEPTANCE: name, surname, signature / stamp</p><p style="font-size:12px;margin-bottom:4px">1. Project manager: <strong>${pm}</strong></p><p style="font-size:12px;margin-bottom:14px">2. Quality controller: <strong>${inspector}</strong></p>
<div style="display:flex;gap:14px;align-items:center"><span style="font-weight:700;font-size:12px">CHECK BY THE PROJECT MANAGER:</span><span style="border:1px solid #333;padding:4px 14px;font-size:12px;font-weight:700;color:${overall==='ACCEPTED'?'#1D9E75':'#333'}">${overall==='ACCEPTED'?'☑':'☐'} ACCEPTED</span><span style="border:1px solid #333;padding:4px 14px;font-size:12px;font-weight:700;color:${overall==='NOT ACCEPTED'?'#E24B4A':'#333'}">${overall==='NOT ACCEPTED'?'☑':'☐'} NOT ACCEPTED</span></div>
<div style="margin-top:18px;border-top:1px solid #999;padding-top:6px;width:200px;font-size:11px;color:#777">Signature:</div></div>
${photoSec}</body></html>`;
  const blob=new Blob([html],{type:'text/html'});
  const url=URL.createObjectURL(blob);
  const a=document.createElement('a');a.href=url;a.download=`QC3_${modName}_${date.replace(/\//g,'-')}.html`;a.click();URL.revokeObjectURL(url);
}

initDropdown();
renderOverview();
</script>
<script async defer src="https://accounts.google.com/gsi/client" onload="gisLoaded()"></script>
<script async defer src="https://apis.google.com/js/api.js" onload="gapiLoaded()"></script>
</body>
</html>
